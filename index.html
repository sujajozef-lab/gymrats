<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight Dates — A Guide to a Lasting Relationship</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#F8F3EC; --cream-dark:#EFE8DD; --ink:#1C1510; --ink-soft:#4A3F35;
    --ink-muted:#8A7A6E; --rose:#C4756A; --rose-light:#F0D5D0; --rose-pale:#FBF0EE;
    --gold:#B8975A; --gold-light:#F2E8D5; --teal:#4A7C74; --teal-light:#D5EAE7;
    --plum:#6B4C7A; --plum-light:#E8DCED;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.7;min-height:100vh;}

  /* HERO */
  .hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:4rem 2rem;position:relative;overflow:hidden;background:var(--ink);}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 80%,rgba(196,117,106,.18) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 20%,rgba(184,151,90,.12) 0%,transparent 55%),radial-gradient(ellipse 50% 70% at 50% 50%,rgba(74,124,116,.08) 0%,transparent 70%);pointer-events:none;}
  .hero-ornament{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:2.5rem;opacity:0;animation:fadeUp 1s ease .2s forwards;}
  .hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(3.5rem,9vw,7rem);font-weight:300;line-height:1.05;color:var(--cream);margin-bottom:1.5rem;opacity:0;animation:fadeUp 1s ease .4s forwards;}
  .hero h1 em{font-style:italic;color:var(--rose);}
  .hero-sub{font-size:clamp(.9rem,2vw,1.05rem);color:rgba(248,243,236,.55);max-width:480px;letter-spacing:.02em;opacity:0;animation:fadeUp 1s ease .6s forwards;margin-bottom:3.5rem;}
  .hero-line{width:60px;height:1px;background:var(--gold);margin:0 auto 2.5rem;opacity:0;animation:fadeUp 1s ease .7s forwards;}
  .hero-nav{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;opacity:0;animation:fadeUp 1s ease .9s forwards;}
  .hero-nav a{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(248,243,236,.6);text-decoration:none;padding:8px 18px;border:.5px solid rgba(248,243,236,.2);border-radius:100px;transition:all .25s;}
  .hero-nav a:hover{color:var(--cream);border-color:var(--gold);background:rgba(184,151,90,.1);}
  .scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fadeUp 1s ease 1.2s forwards;}
  .scroll-hint span{font-size:10px;letter-spacing:.2em;color:rgba(248,243,236,.3);text-transform:uppercase;}
  .scroll-dot{width:1px;height:40px;background:linear-gradient(to bottom,var(--gold),transparent);animation:scrollPulse 2s ease-in-out infinite;}

  /* STICKY NAV */
  .sticky-nav{position:sticky;top:0;z-index:100;background:rgba(248,243,236,.92);backdrop-filter:blur(8px);border-bottom:.5px solid var(--cream-dark);padding:.6rem 2rem;display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .sticky-nav-links{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;flex:1;}
  .sticky-nav a{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);text-decoration:none;padding:5px 12px;border-radius:100px;transition:all .2s;}
  .sticky-nav a:hover{background:var(--cream-dark);color:var(--ink);}

  /* LANGUAGE SWITCHER */
  .lang-switch{display:flex;align-items:center;gap:0;border:.5px solid var(--cream-dark);border-radius:100px;overflow:hidden;flex-shrink:0;}
  .lang-btn{font-size:11px;font-weight:500;letter-spacing:.1em;padding:5px 12px;background:none;border:none;cursor:pointer;color:var(--ink-muted);transition:all .2s;font-family:'DM Sans',sans-serif;}
  .lang-btn.active{background:var(--ink);color:var(--cream);}
  .lang-btn:hover:not(.active){background:var(--cream-dark);color:var(--ink);}

  /* MAIN */
  .main{max-width:900px;margin:0 auto;padding:5rem 2rem;}
  .section-eyebrow{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:.75rem;display:block;}
  .section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3rem);font-weight:300;line-height:1.15;color:var(--ink);margin-bottom:1.25rem;}
  .section-rule{width:40px;height:1.5px;background:var(--gold);margin-bottom:1.5rem;}
  .section-lead{font-size:1rem;color:var(--ink-soft);line-height:1.75;max-width:640px;margin-bottom:3rem;}

  /* BEFORE GRID */
  .before-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1px;background:var(--cream-dark);border:1px solid var(--cream-dark);border-radius:16px;overflow:hidden;margin-bottom:3rem;}
  .before-cell{background:var(--cream);padding:1.5rem;}
  .before-cell-title{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;font-weight:500;}
  .before-cell ul{list-style:none;display:flex;flex-direction:column;gap:8px;}
  .before-cell li{font-size:13px;color:var(--ink-soft);line-height:1.55;padding-left:14px;position:relative;}
  .before-cell li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%;background:var(--rose);}
  .do-dont{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:3rem;}
  .do-box{padding:1.5rem;border-radius:12px;background:#EEF5EC;}
  .dont-box{padding:1.5rem;border-radius:12px;background:var(--rose-pale);}
  .do-box h4{color:#3A6B35;font-size:11px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:1rem;font-weight:500;}
  .dont-box h4{color:var(--rose);font-size:11px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:1rem;font-weight:500;}
  .do-box li,.dont-box li{font-size:13px;line-height:1.6;margin-bottom:7px;padding-left:16px;position:relative;list-style:none;}
  .do-box li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%;background:#3A6B35;}
  .dont-box li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%;background:var(--rose);}
  .do-box li{color:#2A4A27;} .dont-box li{color:#6B3530;}

  /* DATE SECTIONS */
  .date-section{margin-bottom:5rem;opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease;}
  .date-section.visible{opacity:1;transform:translateY(0);}
  .date-header{display:flex;align-items:flex-start;gap:1.5rem;margin-bottom:2rem;}
  .date-num{font-family:'Cormorant Garamond',serif;font-size:4rem;font-weight:300;line-height:1;flex-shrink:0;margin-top:-.3rem;}
  .date-heading{flex:1;}
  .date-heading h2{font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,3.5vw,2.3rem);font-weight:400;line-height:1.15;margin-bottom:4px;}
  .date-heading p{font-size:13px;color:var(--ink-muted);letter-spacing:.05em;}
  .date-focus{padding:1.25rem 1.5rem;border-radius:10px;font-size:13.5px;line-height:1.75;font-style:italic;margin-bottom:2rem;border-left:2px solid;}
  .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:1rem;}
  @media(max-width:680px){.three-col{grid-template-columns:1fr;}.do-dont{grid-template-columns:1fr;}}
  .col-block{border-radius:10px;padding:1.25rem;}
  .col-block h4{font-size:10px;letter-spacing:.25em;text-transform:uppercase;font-weight:500;margin-bottom:1rem;}
  .col-block ul{list-style:none;display:flex;flex-direction:column;gap:9px;}
  .col-block li{font-size:12.5px;line-height:1.6;color:var(--ink-soft);padding-left:14px;position:relative;}
  .col-block li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%;}
  .steps-col{background:var(--cream-dark);} .steps-col h4{color:var(--ink-muted);} .steps-col li::before{background:var(--ink-muted);}
  .questions-col{background:var(--gold-light);} .questions-col h4{color:#7A5F30;} .questions-col li{color:#5A4020;font-style:italic;} .questions-col li::before{background:var(--gold);}
  .breaks-col{background:var(--rose-pale);} .breaks-col h4{color:#8A4A44;} .breaks-col li{color:#6B3530;} .breaks-col li::before{background:var(--rose);}

  /* RITUAL */
  .ritual-block{background:var(--ink);border-radius:12px;padding:1.5rem;margin-top:1rem;}
  .ritual-eyebrow{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;font-weight:500;}
  .ritual-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:400;color:var(--cream);margin-bottom:.75rem;}
  .ritual-desc{font-size:12.5px;color:rgba(248,243,236,.55);line-height:1.7;font-style:italic;margin-bottom:1.25rem;}
  .ritual-steps{display:flex;flex-direction:column;gap:8px;}
  .ritual-step{display:flex;align-items:flex-start;gap:12px;font-size:12.5px;color:rgba(248,243,236,.8);line-height:1.6;}
  .ritual-step-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0;margin-top:1px;}
  .ritual-why{margin-top:1.25rem;padding-top:1.25rem;border-top:.5px solid rgba(248,243,236,.12);font-size:12px;color:rgba(248,243,236,.4);line-height:1.65;}
  .ritual-why strong{color:rgba(248,243,236,.6);font-weight:500;}

  /* DIVIDER */
  .ornamental-divider{display:flex;align-items:center;gap:1rem;margin:4rem 0;}
  .ornamental-divider::before,.ornamental-divider::after{content:'';flex:1;height:.5px;background:linear-gradient(to right,transparent,var(--cream-dark));}
  .ornamental-divider::after{background:linear-gradient(to left,transparent,var(--cream-dark));}
  .ornamental-divider span{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--ink-muted);font-style:italic;}

  /* FOOTER */
  .footer{background:var(--ink);text-align:center;padding:4rem 2rem;}
  .footer h3{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--cream);margin-bottom:.75rem;}
  .footer p{font-size:13px;color:rgba(248,243,236,.4);margin-bottom:2rem;}
  .footer-line{width:40px;height:1px;background:var(--gold);margin:0 auto 1.5rem;}
  .footer-credit{font-size:11px;color:rgba(248,243,236,.25);letter-spacing:.1em;}

  /* COLOR THEMES */
  .d1{--acc:#7F77DD;--apal:#EEEDFE;--atx:#3C3489;} .d2{--acc:#D85A30;--apal:#FAECE7;--atx:#712B13;}
  .d3{--acc:#C4607E;--apal:#FBEAF0;--atx:#72243E;} .d4{--acc:#BA7517;--apal:#FAEEDA;--atx:#633806;}
  .d5{--acc:#639922;--apal:#EAF3DE;--atx:#27500A;} .d6{--acc:#378ADD;--apal:#E6F1FB;--atx:#0C447C;}
  .d7{--acc:#1D9E75;--apal:#E1F5EE;--atx:#085041;} .d8{--acc:#534AB7;--apal:#EEEDFE;--atx:#26215C;}
  .date-num{color:var(--acc);} .date-focus{background:var(--apal);border-color:var(--acc);color:var(--atx);}

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  @keyframes scrollPulse{0%,100%{opacity:.3;}50%{opacity:1;}}
</style>
</head>
<body>

<section class="hero">

  <nav class="hero-nav">

  <!-- DATE 3 -->

      <div class="date-num">03</div>
      <div class="date-heading"><h2 data-i18n="d3_title"></h2><p data-i18n="d3_sub"></p></div>
    </div>
    <div class="date-focus" data-i18n="d3_focus"></div>

    d3_rs2:"Hold for at least two minutes. No talking.",
    d3_rs3:"Notice: your breathing, the warmth, any tension in your own body.",
    d3_rs4:"When you separate, each share one word for how you feel right now.",
    d3_rs5:"Sit down. Begin the date from that place.",
    d3_r_why:"A sustained hold triggers oxytocin, reduces cortisol, and creates felt connection before the vulnerability of this conversation begins.",

    d4_title:"Work & Money", d4_sub:"Values, security, and shared futures",
    d4_focus:"Money is rarely about money — it's about security, freedom, control, and values. Understand your partner's financial personality, not just their spending habits.",
    d4_s1:"Share your earliest money memory and how it shaped your beliefs",
    d4_s2:"Identify your money values: security, freedom, generosity, status?",
    d4_s3:"Discuss what \"enough\" means to each of you",
    d4_s4:"Talk about work — do you feel seen and supported in your career?",
    d4_s5:"Build a shared vision of financial security 5–10 years from now",
    d4_q1:"Was money a source of stress, safety, or something else growing up?",
    d4_q2:"Do you feel financially secure in our relationship right now?",
    d4_q3:"What does financial freedom look like to you?",
    d4_q4:"Is there a financial decision I've made that worried or frustrated you?",
    d4_q5:"Do you feel supported in your career goals — or held back?",
    d4_b1:"Stop if the conversation becomes about fault for past financial mistakes",
    d4_b2:"Don't use this date to negotiate a budget — that's practical, not emotional",
    d4_b3:"Step back if resentment about income inequality is triggered — it needs its own space",
    d4_r_eyebrow:"Opening ritual · 8 min", d4_r_name:"The money memory",
    d4_r_desc:"Money conversations hurt when they're about numbers. This ritual grounds you in the emotional history each person brings to the topic.",
    d4_rs1:"Each take two minutes in silence to recall your earliest memory involving money.",
    d4_rs2:"Share the memory in full. The listener only listens — no commentary yet.",
    d4_rs3:"After both share, each answer: \"What feeling does that memory leave you with?\"",
    d4_rs4:"Acknowledge what you heard: \"It makes sense that you think about money the way you do.\"",
    d4_rs5:"Only then begin the date.",
    d4_r_why:"Your financial personality was shaped long before you met your partner. Understanding its roots prevents you from taking each other's reactions personally.",

    d5_title:"Family", d5_sub:"Roots, roles, and the families we came from",
    d5_focus:"You didn't just marry a person — you married their entire family history. Explore how each of your upbringings shape your expectations of partnership and parenting.",
    d5_s1:"Describe your family growing up — what was the emotional climate?",
    d5_s2:"Identify which patterns you want to carry forward and which to leave behind",
    d5_s3:"Discuss roles: who did what, and what do you expect now?",
    d5_s4:"If you have or want children, explore parenting philosophies and fears",
    d5_s5:"Ask what your parents got right — and what you wish had been different",
    d5_q1:"What's one thing from your upbringing you want us to carry forward?",
    d5_q2:"What pattern from your family are you afraid of repeating?",
    d5_q3:"How was love expressed in your home — words, acts, time?",
    d5_q4:"What did conflict look like in your household — resolved or buried?",
    d5_q5:"What kind of family culture do you want us to create together?",
    d5_b1:"Stop if the conversation indicts each other's families — they aren't the enemy",
    d5_b2:"Pause if childhood trauma surfaces unexpectedly — it deserves a supported space",
    d5_b3:"Don't let in-law tensions dominate — focus on values and patterns, not specific people",
    d5_r_eyebrow:"Opening ritual · 7–8 min", d5_r_name:"Show me one thing",
    d5_r_desc:"Family is abstract until it's specific. Bring your origins into the room concretely before you discuss them.",
    d5_rs1:"Before the date, each find one photo or small object connected to your family or childhood.",
    d5_rs2:"Share it with your partner. Tell the story behind it in two or three minutes.",
    d5_rs3:"The listener asks just one follow-up: \"What do you love most about that memory?\"",
    d5_rs4:"Put the objects somewhere visible for the rest of the date.",
    d5_rs5:"Begin, knowing you've each brought your family into the room with you.",
    d5_r_why:"Objects bypass defensiveness. They make family feel present and real — not a concept to debate, but a life to understand.",

    d6_title:"Play & Adventure", d6_sub:"Fun, spontaneity, and shared joy",
    d6_focus:"Couples who play together stay together. Explore what lights you both up and how well you know each other's idea of fun.",
    d6_s1:"Share your happiest childhood memory of play or adventure",
    d6_s2:"Describe your dream adventure together — big or small",
    d6_s3:"Identify activities that energise you vs. ones you do out of obligation",
    d6_s4:"Find at least one new thing you'd both like to try",
    d6_s5:"Talk about what \"fun\" looked like early in your relationship",
    d6_q1:"What playful thing we used to do have we stopped — and do you miss it?",
    d6_q2:"What would your ideal spontaneous day with me look like?",
    d6_q3:"Is there something you secretly want to try but haven't mentioned?",
    d6_q4:"Do we laugh enough together? What makes you laugh with me?",
    d6_q5:"What does adventure mean to you — travel, novelty, risk, or something else?",
    d6_b1:"Stop if it becomes a catalogue of what's missing or boring in your relationship",
    d6_b2:"Don't dismiss your partner's idea of fun as childish — all play is valid",
    d6_b3:"Step back if comparison to other couples creeps in — it leads nowhere useful",
    d6_r_eyebrow:"Opening ritual · 3 min", d6_r_name:"The 60-second silly",
    d6_r_desc:"You cannot talk about play while being serious. This cracks open lightness before the date begins.",
    d6_rs1:"Set a 60-second timer.",
    d6_rs2:"Both must make each other laugh before it runs out — using only face, voice, or body. No tickling. No props.",
    d6_rs3:"If the first person fails, the other tries.",
    d6_rs4:"Sit down still smiling.",
    d6_rs5:"Begin by sharing: \"The funniest thing we ever did together was…\"",
    d6_r_why:"Laughter is physiologically incompatible with anxiety. Starting from joy makes it far easier to talk honestly about fun.",

    d7_title:"Growth & Spirituality", d7_sub:"Meaning, purpose, and personal evolution",
    d7_focus:"The deepest questions — what do you believe, what gives your life meaning, and how do you grow together? There are no right answers, only honest ones.",
    d7_s1:"Share what gives your life a sense of meaning and purpose",
    d7_s2:"Discuss your beliefs — spiritual, philosophical, or secular",
    d7_s3:"Ask: \"How have you changed in the last five years? What changed you?\"",
    d7_s4:"Explore what personal growth looks like and how you support each other in it",
    d7_s5:"Discuss rituals or practices that feel meaningful to you as a couple",
    d7_q1:"What do you believe happens after we die — and does it bring you comfort?",
    d7_q2:"What gives your life the most meaning right now?",
    d7_q3:"Do you feel I support who you're becoming, or who you used to be?",
    d7_q4:"Is there a part of yourself you feel you've lost in our relationship? Or gained?",
    d7_q5:"What would you regret not doing if you knew your time was limited?",
    d7_b1:"Stop if it turns into a debate about whose beliefs are correct — it's about understanding",
    d7_b2:"Pause if existential fears become overwhelming — that's deep work, not a dinner topic",
    d7_b3:"Step back if one partner feels pressured to adopt the other's worldview",
    d7_r_eyebrow:"Opening ritual · 8–10 min", d7_r_name:"The silence sit",
    d7_r_desc:"This date asks the biggest questions. It deserves the most intentional opening. Shared silence is not awkward — it is the beginning of the conversation.",
    d7_rs1:"Sit together somewhere quiet. Turn off all sound.",
    d7_rs2:"Set a timer for five minutes. Sit in complete silence side by side or facing each other.",
    d7_rs3:"No phones. No fidgeting. Just sit.",
    d7_rs4:"When the timer ends, each share the first word that came to mind during the silence.",
    d7_rs5:"Use those two words as the opening question: \"Why did that word come to you?\"",
    d7_r_why:"Silence creates interiority. Meaning and purpose live beneath the noise — five minutes of shared quiet is often more connecting than five minutes of conversation.",

    d8_title:"Dreams & Visions", d8_sub:"The future you're building together",
    d8_focus:"The capstone date. Build a shared map of the future — not a rigid plan, but a living vision that honours both people's dreams.",
    d8_s1:"Each share your deepest personal dream — something never fully voiced",
    d8_s2:"Describe your ideal life together in ten years",
    d8_s3:"Look for overlap and divergence — where do dreams align and pull apart?",
    d8_s4:"Discuss what legacy you want to leave as a couple and as individuals",
    d8_s5:"Create a shared vision statement: \"We are building a life that…\"",
    d8_q1:"What's a dream you've had since childhood you've never told me about?",
    d8_q2:"If money and fear were removed, what would you do with your life?",
    d8_q3:"What does success look like to you — and does our life reflect that?",
    d8_q4:"What do you want people to say about us as a couple when we're gone?",
    d8_q5:"Is there a dream you're afraid to share because you think I won't support it?",
    d8_b1:"Stop if dreams are met with \"that's not realistic\" — it kills vulnerability instantly",
    d8_b2:"Don't treat diverging dreams as incompatibility — different visions can coexist",
    d8_b3:"Step back if anxiety about the future overrides possibility — return to what's already good",
    d8_r_eyebrow:"Opening ritual · 10 min", d8_r_name:"The future letter",
    d8_r_desc:"This is the last and biggest date. The ritual opens you to a future orientation — from who you've been to who you are becoming.",
    d8_rs1:"Each take a piece of paper and write a letter to yourself, ten years from now. Five to eight sentences. What do you hope is true?",
    d8_rs2:"Take five minutes. Write in silence.",
    d8_rs3:"Read your letters aloud to each other. No interruption.",
    d8_rs4:"Each respond with: \"The part that moved me most was…\"",
    d8_rs5:"Fold the letters and keep them. Begin the date knowing you've spoken your future into the room.",
    d8_r_why:"Writing activates future-self thinking, which creates hope and intentionality — exactly the mindset needed to build a shared vision rather than manage current problems.",

let currentLang = localStorage.getItem('lang') || 'en';

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-sk').classList.toggle('active', lang === 'sk');
  document.documentElement.lang = lang;

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (T[lang][key] !== undefined) el.textContent = T[lang][key];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (T[lang][key] !== undefined) el.innerHTML = T[lang][key];
  });
}

// Scroll reveal
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }});
}, { threshold: 0.08 });
document.querySelectorAll('.date-section').forEach(el => observer.observe(el));

// Init
setLang(currentLang);
