<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twelve Dates</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F8F3EC;--cream-dark:#EFE8DD;--cream-mid:#F3EDE3;
  --ink:#1C1510;--ink-soft:#4A3F35;--ink-muted:#8A7A6E;
  --rose:#C4756A;--rose-pale:#FBF0EE;
  --gold:#B8975A;--gold-light:#F2E8D5;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.7;min-height:100vh;overflow-x:hidden;}

.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:4rem 2rem;position:relative;overflow:hidden;background:var(--ink);}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 80%,rgba(196,117,106,.18) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 20%,rgba(184,151,90,.12) 0%,transparent 55%);pointer-events:none;}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(3.5rem,9vw,7rem);font-weight:300;line-height:1.05;color:var(--cream);margin-bottom:1.5rem;opacity:0;animation:fadeUp 1s ease .2s forwards;}
.hero h1 em{font-style:italic;color:var(--rose);}
.hero-sub{font-size:clamp(.9rem,2vw,1.05rem);color:rgba(248,243,236,.55);max-width:480px;letter-spacing:.02em;opacity:0;animation:fadeUp 1s ease .4s forwards;margin:0 auto 3.5rem;text-align:center;}
.hero-line{width:60px;height:1px;background:var(--gold);margin:0 auto 2.5rem;opacity:0;animation:fadeUp 1s ease .5s forwards;}
.hero-nav{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;opacity:0;animation:fadeUp 1s ease .7s forwards;}
.hero-nav a{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(248,243,236,.6);text-decoration:none;padding:8px 18px;border:.5px solid rgba(248,243,236,.2);border-radius:100px;transition:all .25s;}
.hero-nav a:hover{color:var(--cream);border-color:var(--gold);background:rgba(184,151,90,.1);}
.scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fadeUp 1s ease 1s forwards;}
.scroll-hint span{font-size:10px;letter-spacing:.2em;color:rgba(248,243,236,.3);text-transform:uppercase;}
.scroll-dot{width:1px;height:40px;background:linear-gradient(to bottom,var(--gold),transparent);animation:scrollPulse 2s ease-in-out infinite;}

/* STICKY NAV */
.sticky-nav{position:sticky;top:0;z-index:100;background:rgba(248,243,236,.95);backdrop-filter:blur(10px);border-bottom:.5px solid var(--cream-dark);padding:.5rem 1rem;display:flex;flex-direction:column;gap:5px;}
.nav-utility{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.nav-intro-link{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);text-decoration:none;padding:5px 10px;border-radius:100px;transition:all .2s;white-space:nowrap;}
.nav-intro-link:hover{background:var(--cream-dark);color:var(--ink);}
.nav-right{display:flex;align-items:center;gap:6px;}
.nav-dates{display:flex;flex-direction:column;gap:3px;}
.nav-dates-row{display:flex;gap:2px;justify-content:center;}
.nav-dates-row a{font-size:10px;font-family:'Cormorant Garamond',serif;font-style:italic;letter-spacing:.05em;color:var(--ink-muted);text-decoration:none;padding:3px 7px;border-radius:100px;transition:all .2s;min-width:24px;text-align:center;}
.nav-dates-row a:hover{background:var(--cream-dark);color:var(--ink);}
.mydate-btn{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:5px 13px;border-radius:100px;cursor:pointer;border:.5px solid var(--cream-dark);background:none;color:var(--ink-muted);font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;}
.mydate-btn:hover{background:var(--cream-dark);color:var(--ink);}
.mydate-btn.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}
.lang-switch{display:flex;align-items:center;border:.5px solid var(--cream-dark);border-radius:100px;overflow:hidden;flex-shrink:0;}
.lang-btn{font-size:10px;font-weight:500;letter-spacing:.08em;padding:4px 9px;background:none;border:none;cursor:pointer;color:var(--ink-muted);transition:all .2s;font-family:'DM Sans',sans-serif;}
.lang-btn.active{background:var(--ink);color:var(--cream);}
.lang-btn:hover:not(.active){background:var(--cream-dark);color:var(--ink);}
@media(min-width:640px){
  .sticky-nav{flex-direction:row;align-items:center;justify-content:space-between;padding:.5rem 1.5rem;}
  .nav-utility{flex:0 0 auto;}
  .nav-dates{flex-direction:column;gap:2px;}
  .nav-dates-row{gap:2px;}
}

/* VIEW SWITCHING */
.view-guide .guide-only{display:block;}
.view-guide .form-only{display:none;}
.view-form .guide-only{display:none;}
.view-form .form-only{display:block;}

/* GUIDE */
.main{max-width:900px;margin:0 auto;padding:5rem 2rem;}
.section-eyebrow{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:.75rem;display:block;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3rem);font-weight:300;line-height:1.15;color:var(--ink);margin-bottom:1.25rem;}
.section-rule{width:40px;height:1.5px;background:var(--gold);margin-bottom:1.5rem;}
.section-lead{font-size:1rem;color:var(--ink-soft);line-height:1.75;max-width:640px;margin-bottom:3rem;}
.before-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1px;background:var(--cream-dark);border:1px solid var(--cream-dark);border-radius:16px;overflow:hidden;margin-bottom:3rem;}
.before-cell{background:var(--cream);padding:1.5rem;}
.before-cell-title{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;font-weight:500;}
.before-cell ul{list-style:none;display:flex;flex-direction:column;gap:8px;}
.before-cell li{font-size:13px;color:var(--ink-soft);line-height:1.55;padding-left:14px;position:relative;}
.before-cell li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%;background:var(--rose);}
.do-dont{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:3rem;}
@media(max-width:500px){.do-dont{grid-template-columns:1fr;}}
.do-box{padding:1.5rem;border-radius:12px;background:#EEF5EC;}
.dont-box{padding:1.5rem;border-radius:12px;background:var(--rose-pale);}
.do-box h4{color:#3A6B35;font-size:11px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:1rem;font-weight:500;}
.dont-box h4{color:var(--rose);font-size:11px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:1rem;font-weight:500;}
.do-box li,.dont-box li{font-size:13px;line-height:1.6;margin-bottom:7px;padding-left:16px;position:relative;list-style:none;}
.do-box li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%;background:#3A6B35;}
.dont-box li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%;background:var(--rose);}
.do-box li{color:#2A4A27;}.dont-box li{color:#6B3530;}
.date-section{margin-bottom:5rem;opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease;}
.date-section.visible{opacity:1;transform:translateY(0);}
.date-header{display:flex;align-items:flex-start;gap:1.5rem;margin-bottom:2rem;}
.date-num{font-family:'Cormorant Garamond',serif;font-size:4rem;font-weight:300;line-height:1;flex-shrink:0;margin-top:-.3rem;}
.date-heading h2{font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,3.5vw,2.3rem);font-weight:400;line-height:1.15;margin-bottom:4px;}
.date-heading p{font-size:13px;color:var(--ink-muted);letter-spacing:.05em;}
.date-focus{padding:1.25rem 1.5rem;border-radius:10px;font-size:13.5px;line-height:1.75;font-style:italic;margin-bottom:2rem;border-left:2px solid;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:1rem;}
@media(max-width:680px){.three-col{grid-template-columns:1fr;}}
.col-block{border-radius:10px;padding:1.25rem;}
.col-block h4{font-size:10px;letter-spacing:.25em;text-transform:uppercase;font-weight:500;margin-bottom:1rem;}
.col-block ul{list-style:none;display:flex;flex-direction:column;gap:9px;}
.col-block li{font-size:12.5px;line-height:1.6;color:var(--ink-soft);padding-left:14px;position:relative;}
.col-block li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%;}
.steps-col{background:var(--cream-dark);}.steps-col h4{color:var(--ink-muted);}.steps-col li::before{background:var(--ink-muted);}
.questions-col{background:var(--gold-light);}.questions-col h4{color:#7A5F30;}.questions-col li{color:#5A4020;font-style:italic;}.questions-col li::before{background:var(--gold);}
.breaks-col{background:var(--rose-pale);}.breaks-col h4{color:#8A4A44;}.breaks-col li{color:#6B3530;}.breaks-col li::before{background:var(--rose);}
.ritual-block{background:var(--ink);border-radius:12px;padding:1.5rem;margin-top:1rem;}
.ritual-eyebrow{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;font-weight:500;}
.ritual-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:400;color:var(--cream);margin-bottom:.75rem;}
.ritual-desc{font-size:12.5px;color:rgba(248,243,236,.55);line-height:1.7;font-style:italic;margin-bottom:1.25rem;}
.ritual-steps{display:flex;flex-direction:column;gap:8px;}
.ritual-step{display:flex;align-items:flex-start;gap:12px;font-size:12.5px;color:rgba(248,243,236,.8);line-height:1.6;}
.ritual-step-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0;margin-top:1px;}
.ritual-why{margin-top:1.25rem;padding-top:1.25rem;border-top:.5px solid rgba(248,243,236,.12);font-size:12px;color:rgba(248,243,236,.4);line-height:1.65;}
.ritual-why strong{color:rgba(248,243,236,.6);font-weight:500;}
.ornamental-divider{display:flex;align-items:center;gap:1rem;margin:4rem 0;}
.ornamental-divider::before,.ornamental-divider::after{content:'';flex:1;height:.5px;background:linear-gradient(to right,transparent,var(--cream-dark));}
.ornamental-divider::after{background:linear-gradient(to left,transparent,var(--cream-dark));}
.ornamental-divider span{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--ink-muted);font-style:italic;}
.footer{background:var(--ink);text-align:center;padding:4rem 2rem;}
.footer h3{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--cream);margin-bottom:.75rem;}
.footer p{font-size:13px;color:rgba(248,243,236,.4);margin-bottom:2rem;}
.footer-line{width:40px;height:1px;background:var(--gold);margin:0 auto 1.5rem;}
.footer-credit{font-size:11px;color:rgba(248,243,236,.25);letter-spacing:.1em;}

/* COLOR THEMES — ORIGINAL 8 */
.d1{--acc:#7F77DD;--apal:#EEEDFE;--atx:#3C3489;}.d2{--acc:#D85A30;--apal:#FAECE7;--atx:#712B13;}
.d3{--acc:#C4607E;--apal:#FBEAF0;--atx:#72243E;}.d4{--acc:#BA7517;--apal:#FAEEDA;--atx:#633806;}
.d5{--acc:#639922;--apal:#EAF3DE;--atx:#27500A;}.d6{--acc:#378ADD;--apal:#E6F1FB;--atx:#0C447C;}
.d7{--acc:#1D9E75;--apal:#E1F5EE;--atx:#085041;}.d8{--acc:#534AB7;--apal:#EEEDFE;--atx:#26215C;}
/* NEW 4 */
.d9{--acc:#8B5CF6;--apal:#EDE9FE;--atx:#4C1D95;}
.d10{--acc:#D97706;--apal:#FEF3C7;--atx:#78350F;}
.d11{--acc:#059669;--apal:#ECFDF5;--atx:#064E3B;}
.d12{--acc:#2563EB;--apal:#EFF6FF;--atx:#1E3A8A;}
.date-num{color:var(--acc);}.date-focus{background:var(--apal);border-color:var(--acc);color:var(--atx);}

/* FORM VIEW */
.form-view-wrap{max-width:820px;margin:0 auto;padding:2.5rem 2rem 6rem;}
.progress-wrap{background:rgba(28,21,16,.08);height:2px;}
.progress-bar{height:2px;background:var(--gold);width:0%;transition:width .4s ease;}
.save-indicator{font-size:11px;letter-spacing:.1em;color:var(--ink-muted);transition:color .4s;}
.save-indicator.saved{color:#2A7A5A;}
.btn-export{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border-radius:100px;cursor:pointer;background:var(--gold);color:var(--ink);border:none;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-export:hover{background:#a8823e;}
.btn-import{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border-radius:100px;cursor:pointer;background:none;color:var(--ink-muted);border:.5px solid var(--cream-dark);font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-import:hover{background:var(--cream-dark);color:var(--ink);}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--cream);font-size:12px;font-weight:500;letter-spacing:.08em;padding:10px 22px;border-radius:100px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:#8B2020;}
.couple-card{background:var(--ink);border-radius:16px;padding:2rem;margin-bottom:2.5rem;}
.couple-card h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;color:var(--cream);margin-bottom:.4rem;}
.couple-card p{font-size:13px;color:rgba(248,243,236,.4);margin-bottom:1.5rem;}
.couple-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:580px){.couple-fields{grid-template-columns:1fr 1fr;}}
@media(max-width:380px){.couple-fields{grid-template-columns:1fr;}}
.field-group label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(248,243,236,.4);display:block;margin-bottom:6px;font-weight:500;}
.field-group input{width:100%;background:rgba(248,243,236,.08);border:.5px solid rgba(248,243,236,.15);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--cream);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.field-group input:focus{border-color:rgba(184,151,90,.6);}
.field-group input::placeholder{color:rgba(248,243,236,.2);}
.date-block{margin-bottom:3rem;opacity:0;transform:translateY(20px);transition:opacity .6s,transform .6s;}
.date-block.visible{opacity:1;transform:translateY(0);}
.date-block-header{display:flex;align-items:flex-start;gap:1.25rem;padding:1.5rem;border-radius:14px 14px 0 0;border:1px solid var(--cream-dark);border-bottom:none;background:var(--cream-mid);}
.date-num-badge{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:300;line-height:1;flex-shrink:0;}
.date-block-meta{flex:1;}
.date-block-meta h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400;line-height:1.2;margin-bottom:2px;}
.date-block-meta p{font-size:12px;color:var(--ink-muted);letter-spacing:.04em;}
.date-done-row{display:flex;align-items:center;gap:12px;margin-top:10px;flex-wrap:wrap;}
.date-done-label{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;}
.date-done-input{background:var(--cream);border:.5px solid var(--cream-dark);border-radius:8px;padding:6px 10px;font-size:13px;color:var(--ink);font-family:'DM Sans',sans-serif;outline:none;}
.date-done-input:focus{border-color:var(--gold);}
.date-block-body{border:1px solid var(--cream-dark);border-top:none;border-radius:0 0 14px 14px;background:white;overflow:hidden;}
.question-row{padding:1.25rem 1.5rem;border-bottom:.5px solid var(--cream-dark);}
.question-row:last-child{border-bottom:none;}
.q-label{font-size:12.5px;font-style:italic;color:var(--ink-soft);line-height:1.6;margin-bottom:.75rem;padding-left:12px;border-left:2px solid var(--gold);}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:540px){.answers-grid{grid-template-columns:1fr;}}
.answer-group label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-muted);display:block;margin-bottom:5px;font-weight:500;}
textarea{width:100%;min-height:72px;resize:vertical;background:var(--cream);border:.5px solid var(--cream-dark);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--ink);line-height:1.6;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
textarea:focus{border-color:var(--gold);background:#fff;}
textarea::placeholder{color:var(--ink-muted);opacity:.5;}
.notes-row{padding:1.25rem 1.5rem;background:var(--gold-light);border-top:.5px solid var(--cream-dark);}
.notes-row label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#7A5F30;display:block;margin-bottom:6px;font-weight:500;}
.notes-row textarea{background:#fff;border-color:rgba(184,151,90,.3);min-height:60px;}
.rating-row{padding:1rem 1.5rem;background:var(--cream-mid);border-top:.5px solid var(--cream-dark);display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.rating-label{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;white-space:nowrap;}
.stars{display:flex;gap:4px;}
.star{width:28px;height:28px;border-radius:50%;border:.5px solid var(--cream-dark);background:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--ink-muted);}
.star:hover,.star.active{background:var(--gold);border-color:var(--gold);color:var(--ink);}
.mood-row{padding:1rem 1.5rem;background:var(--rose-pale);border-top:.5px solid var(--cream-dark);display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
.mood-chip{font-size:12px;padding:5px 13px;border-radius:100px;border:.5px solid rgba(196,117,106,.3);background:none;cursor:pointer;color:var(--rose);font-family:'DM Sans',sans-serif;transition:all .15s;}
.mood-chip.active{background:var(--rose);color:white;border-color:var(--rose);}
.completion-banner{background:var(--ink);border-radius:16px;padding:2rem;text-align:center;margin-top:2.5rem;display:none;}
.completion-banner.show{display:block;}
.completion-banner h3{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:var(--cream);margin-bottom:.5rem;}
.completion-banner p{font-size:13px;color:rgba(248,243,236,.45);margin-bottom:1.5rem;}
.btn-full-export{display:inline-block;background:var(--gold);color:var(--ink);font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:10px 24px;border-radius:100px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-full-export:hover{background:#a8823e;}
/* form badge colors */
.fb1 .q-label{border-color:#7F77DD;}.fb1 .date-num-badge{color:#7F77DD;}
.fb2 .q-label{border-color:#D85A30;}.fb2 .date-num-badge{color:#D85A30;}
.fb3 .q-label{border-color:#C4607E;}.fb3 .date-num-badge{color:#C4607E;}
.fb4 .q-label{border-color:#BA7517;}.fb4 .date-num-badge{color:#BA7517;}
.fb5 .q-label{border-color:#639922;}.fb5 .date-num-badge{color:#639922;}
.fb6 .q-label{border-color:#378ADD;}.fb6 .date-num-badge{color:#378ADD;}
.fb7 .q-label{border-color:#1D9E75;}.fb7 .date-num-badge{color:#1D9E75;}
.fb8 .q-label{border-color:#534AB7;}.fb8 .date-num-badge{color:#534AB7;}
.fb9 .q-label{border-color:#8B5CF6;}.fb9 .date-num-badge{color:#8B5CF6;}
.fb10 .q-label{border-color:#D97706;}.fb10 .date-num-badge{color:#D97706;}
.fb11 .q-label{border-color:#059669;}.fb11 .date-num-badge{color:#059669;}
.fb12 .q-label{border-color:#2563EB;}.fb12 .date-num-badge{color:#2563EB;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes scrollPulse{0%,100%{opacity:.3;}50%{opacity:1;}}
@media(max-width:600px){
  .form-view-wrap{padding:1.5rem 1rem 5rem;}
  .date-block-header{padding:1.1rem;}
  .question-row{padding:1rem 1.1rem;}
}
</style>
</head>
<body class="view-guide">

<!-- HERO -->
<section class="hero guide-only">

  d4_title:"Work & Money",d4_sub:"Values, security, and shared futures",d4_focus:"Money is rarely about money — it's about security, freedom, control, and values. Understand your partner's financial personality, not just their spending habits.",d4_s1:"Share your earliest money memory and how it shaped your beliefs",d4_s2:"Identify your money values: security, freedom, generosity, status?",d4_s3:"Discuss what \"enough\" means to each of you",d4_s4:"Talk about work — do you feel seen and supported in your career?",d4_s5:"Build a shared vision of financial security 5–10 years from now",d4_q1:"Was money a source of stress, safety, or something else growing up?",d4_q2:"Do you feel financially secure in our relationship right now?",d4_q3:"What does financial freedom look like to you?",d4_q4:"Is there a financial decision I've made that worried or frustrated you?",d4_q5:"Do you feel supported in your career goals — or held back?",d4_b1:"Stop if the conversation becomes about fault for past financial mistakes",d4_b2:"Don't use this date to negotiate a budget — that's practical, not emotional",d4_b3:"Step back if resentment about income inequality is triggered — it needs its own space",d4_r_eyebrow:"Opening ritual · 8 min",d4_r_name:"The money memory",d4_r_desc:"Money conversations hurt when they're about numbers. This ritual grounds you in the emotional history each person brings to the topic.",d4_rs1:"Each take two minutes in silence to recall your earliest memory involving money.",d4_rs2:"Share the memory in full. The listener only listens — no commentary yet.",d4_rs3:"After both share, each answer: \"What feeling does that memory leave you with?\"",d4_rs4:"Acknowledge what you heard: \"It makes sense that you think about money the way you do.\"",d4_rs5:"Only then begin the date.",d4_r_why:"Your financial personality was shaped long before you met your partner. Understanding its roots prevents you from taking each other's reactions personally.",
  // DATE 5
  d5_title:"Family",d5_sub:"Roots, roles, and the families we came from",d5_focus:"You didn't just marry a person — you married their entire family history. Explore how each of your upbringings shape your expectations of partnership and parenting.",d5_s1:"Describe your family growing up — what was the emotional climate?",d5_s2:"Identify which patterns you want to carry forward and which to leave behind",d5_s3:"Discuss roles: who did what, and what do you expect now?",d5_s4:"If you have or want children, explore parenting philosophies and fears",d5_s5:"Ask what your parents got right — and what you wish had been different",d5_q1:"What's one thing from your upbringing you want us to carry forward?",d5_q2:"What pattern from your family are you afraid of repeating?",d5_q3:"How was love expressed in your home — words, acts, time?",d5_q4:"What did conflict look like in your household — resolved or buried?",d5_q5:"What kind of family culture do you want us to create together?",d5_b1:"Stop if the conversation indicts each other's families — they aren't the enemy",d5_b2:"Pause if childhood trauma surfaces unexpectedly — it deserves a supported space",d5_b3:"Don't let in-law tensions dominate — focus on values and patterns, not specific people",d5_r_eyebrow:"Opening ritual · 7–8 min",d5_r_name:"Show me one thing",d5_r_desc:"Family is abstract until it's specific. Bring your origins into the room concretely before you discuss them.",d5_rs1:"Before the date, each find one photo or small object connected to your family or childhood.",d5_rs2:"Share it with your partner. Tell the story behind it in two or three minutes.",d5_rs3:"The listener asks just one follow-up: \"What do you love most about that memory?\"",d5_rs4:"Put the objects somewhere visible for the rest of the date.",d5_rs5:"Begin, knowing you've each brought your family into the room with you.",d5_r_why:"Objects bypass defensiveness. They make family feel present and real — not a concept to debate, but a life to understand.",
  // DATE 6
  d6_title:"Play & Adventure",d6_sub:"Fun, spontaneity, and shared joy",d6_focus:"Couples who play together stay together. Explore what lights you both up and how well you know each other's idea of fun.",d6_s1:"Share your happiest childhood memory of play or adventure",d6_s2:"Describe your dream adventure together — big or small",d6_s3:"Identify activities that energise you vs. ones you do out of obligation",d6_s4:"Find at least one new thing you'd both like to try",d6_s5:"Talk about what \"fun\" looked like early in your relationship",d6_q1:"What playful thing we used to do have we stopped — and do you miss it?",d6_q2:"What would your ideal spontaneous day with me look like?",d6_q3:"Is there something you secretly want to try but haven't mentioned?",d6_q4:"Do we laugh enough together? What makes you laugh with me?",d6_q5:"What does adventure mean to you — travel, novelty, risk, or something else?",d6_b1:"Stop if it becomes a catalogue of what's missing or boring in your relationship",d6_b2:"Don't dismiss your partner's idea of fun as childish — all play is valid",d6_b3:"Step back if comparison to other couples creeps in — it leads nowhere useful",d6_r_eyebrow:"Opening ritual · 3 min",d6_r_name:"The 60-second silly",d6_r_desc:"You cannot talk about play while being serious. This cracks open lightness before the date begins.",d6_rs1:"Set a 60-second timer.",d6_rs2:"Both must make each other laugh before it runs out — using only face, voice, or body. No tickling. No props.",d6_rs3:"If the first person fails, the other tries.",d6_rs4:"Sit down still smiling.",d6_rs5:"Begin by sharing: \"The funniest thing we ever did together was…\"",d6_r_why:"Laughter is physiologically incompatible with anxiety. Starting from joy makes it far easier to talk honestly about fun.",
  // DATE 7
  d7_title:"Growth & Spirituality",d7_sub:"Meaning, purpose, and personal evolution",d7_focus:"The deepest questions — what do you believe, what gives your life meaning, and how do you grow together? There are no right answers, only honest ones.",d7_s1:"Share what gives your life a sense of meaning and purpose",d7_s2:"Discuss your beliefs — spiritual, philosophical, or secular",d7_s3:"Ask: \"How have you changed in the last five years? What changed you?\"",d7_s4:"Explore what personal growth looks like and how you support each other in it",d7_s5:"Discuss rituals or practices that feel meaningful to you as a couple",d7_q1:"What do you believe happens after we die — and does it bring you comfort?",d7_q2:"What gives your life the most meaning right now?",d7_q3:"Do you feel I support who you're becoming, or who you used to be?",d7_q4:"Is there a part of yourself you feel you've lost in our relationship? Or gained?",d7_q5:"What would you regret not doing if you knew your time was limited?",d7_b1:"Stop if it turns into a debate about whose beliefs are correct — it's about understanding",d7_b2:"Pause if existential fears become overwhelming — that's deep work, not a dinner topic",d7_b3:"Step back if one partner feels pressured to adopt the other's worldview",d7_r_eyebrow:"Opening ritual · 8–10 min",d7_r_name:"The silence sit",d7_r_desc:"This date asks the biggest questions. It deserves the most intentional opening. Shared silence is not awkward — it is the beginning of the conversation.",d7_rs1:"Sit together somewhere quiet. Turn off all sound.",d7_rs2:"Set a timer for five minutes. Sit in complete silence side by side or facing each other.",d7_rs3:"No phones. No fidgeting. Just sit.",d7_rs4:"When the timer ends, each share the first word that came to mind during the silence.",d7_rs5:"Use those two words as the opening question: \"Why did that word come to you?\"",d7_r_why:"Silence creates interiority. Meaning and purpose live beneath the noise — five minutes of shared quiet is often more connecting than five minutes of conversation.",
  // DATE 8
  d8_title:"Dreams & Visions",d8_sub:"The future you're building together",d8_focus:"The capstone date. Build a shared map of the future — not a rigid plan, but a living vision that honours both people's dreams.",d8_s1:"Each share your deepest personal dream — something never fully voiced",d8_s2:"Describe your ideal life together in ten years",d8_s3:"Look for overlap and divergence — where do dreams align and pull apart?",d8_s4:"Discuss what legacy you want to leave as a couple and as individuals",d8_s5:"Create a shared vision statement: \"We are building a life that…\"",d8_q1:"What's a dream you've had since childhood you've never told me about?",d8_q2:"If money and fear were removed, what would you do with your life?",d8_q3:"What does success look like to you — and does our life reflect that?",d8_q4:"What do you want people to say about us as a couple when we're gone?",d8_q5:"Is there a dream you're afraid to share because you think I won't support it?",d8_b1:"Stop if dreams are met with \"that's not realistic\" — it kills vulnerability instantly",d8_b2:"Don't treat diverging dreams as incompatibility — different visions can coexist",d8_b3:"Step back if anxiety about the future overrides possibility — return to what's already good",d8_r_eyebrow:"Opening ritual · 10 min",d8_r_name:"The future letter",d8_r_desc:"This is the last of the original eight dates. The ritual opens you to a future orientation — from who you've been to who you are becoming.",d8_rs1:"Each take a piece of paper and write a letter to yourself, ten years from now. Five to eight sentences. What do you hope is true?",d8_rs2:"Take five minutes. Write in silence.",d8_rs3:"Read your letters aloud to each other. No interruption.",d8_rs4:"Each respond with: \"The part that moved me most was…\"",d8_rs5:"Fold the letters and keep them. Begin the date knowing you've spoken your future into the room.",d8_r_why:"Writing activates future-self thinking, which creates hope and intentionality — exactly the mindset needed to build a shared vision rather than manage current problems.",
  // DATE 9 — MENTAL HEALTH
  d9_title:"Mental Health & Wellbeing",d9_sub:"The conversation most couples only have after crisis",
  d9_focus:"Explore your emotional landscapes — the conditions, patterns, and needs that shape how you each function. This isn't therapy; it's the prerequisite for being each other's ally rather than each other's mystery.",
  d9_s1:"Share your personal history with anxiety, depression, or emotional struggles",d9_s2:"Describe your early warning signs — what does 'not okay' look like for you?",d9_s3:"Tell your partner what you need when struggling — and what makes it worse",d9_s4:"Discuss your relationship with therapy — individual and as a couple",d9_s5:"Make a quiet plan together: what should I do if I notice you're not okay?",
  d9_q1:"What are your early warning signs that you're struggling emotionally?",d9_q2:"What do you need from me when you're not doing well — space, presence, or something else?",d9_q3:"Is there a mental health struggle from your past that still shapes how you behave today?",d9_q4:"Have I ever made things harder for you without realising it during a difficult period?",d9_q5:"What's the most helpful thing I've done for your emotional wellbeing without knowing it?",
  d9_b1:"Stop if you begin diagnosing or explaining their mental state back to them",d9_b2:"Pause if a current crisis surfaces — this needs real support, not a date format",d9_b3:"Step back if mental health is used to explain hurtful behaviour rather than understand it",
  d9_r_eyebrow:"Opening ritual · 5 min",d9_r_name:"The weather report",
  d9_r_desc:"Before talking about your inner landscape, map it with a simple metaphor. This removes the pressure of finding the right words for complex emotional states.",
  d9_rs1:"Each take 2 minutes alone to silently complete: \"My emotional weather this week has been...\"",d9_rs2:"Share your weather report — sunny, foggy, stormy, changeable, calm. No explanation required yet.",d9_rs3:"The listener responds: \"Tell me more about the [word they used].\"",d9_rs4:"Share for just 2 minutes each. Don't solve. Don't fix.",d9_rs5:"End with: \"I'm glad I know this about you.\"",
  d9_r_why:"Metaphor creates distance from shame. Weather isn't anyone's fault — it just is. This makes it safer to speak about mental states before the harder conversation has begun.",
  // DATE 10 — IDENTITY
  d10_title:"Identity & Personal Freedom",d10_sub:"Who are you outside this relationship?",
  d10_focus:"Healthy relationships require each person to remain a distinct individual. This date is about the parts of yourself that exist — or once existed — independent of being someone's partner. Knowing who your partner truly is requires knowing who they are alone.",
  d10_s1:"Share who you were before this relationship — what defined you?",d10_s2:"Name interests, ambitions, or habits you've quietly set aside since being together",d10_s3:"Discuss how much alone time you genuinely need and what it restores in you",d10_s4:"Explore the parts of yourself you feel you can't fully express in this relationship",d10_s5:"Ask each other: who are you becoming — and are we growing in compatible directions?",
  d10_q1:"Is there a version of yourself you feel you've lost or suppressed since we got together?",d10_q2:"What do you do — or who do you become — when you have time completely to yourself?",d10_q3:"What do you need from me to feel free to be fully yourself?",d10_q4:"Have you quietly given up an ambition or interest for this relationship?",d10_q5:"Are we growing in directions that feel compatible to you?",
  d10_b1:"Stop if the conversation becomes a list of what the relationship has cost you — that's a harder, different conversation",d10_b2:"Pause if identity loss feels very deep — it may need individual therapy, not a date",d10_b3:"Step back if comparison to a previous relationship or ex-partner surfaces as a reference point",
  d10_r_eyebrow:"Opening ritual · 5 min",d10_r_name:"Three words",
  d10_r_desc:"Before the date, each person quietly chooses three words that describe who they are outside this relationship. Not a role — just self.",
  d10_rs1:"Take 3 minutes in silence. Each write down three words for who you are independent of this relationship.",d10_rs2:"Share your three words one at a time. No explanation yet.",d10_rs3:"The listener picks the most surprising word: \"Tell me about [that word].\"",d10_rs4:"Each person speaks for 2 minutes about that word.",d10_rs5:"End by saying: \"I want you to always be that person.\"",
  d10_r_why:"Beginning with three words removes the blank-page anxiety of self-description. It tends to surface things neither person expected — and creates a felt sense of being truly seen.",
  // DATE 11 — AGING & HEALTH
  d11_title:"Aging, Health & the Body",d11_sub:"Physical vulnerability and growing older together",
  d11_focus:"The conversation about bodies, health, and aging is one most couples defer until circumstances force it. Having it early — from curiosity rather than fear — changes how both people navigate illness, change, and the passage of time together.",
  d11_s1:"Share your family health history and what it might mean for your future",d11_s2:"Talk honestly about your relationship with your body — not just appearance, but vitality",d11_s3:"Discuss caregiving: what would you need from me if you were seriously ill?",d11_s4:"Explore end-of-life wishes — the conversation that protects both of you",d11_s5:"Talk about aging parents: what responsibility each of you feels, and how that affects us",
  d11_q1:"Is there a health concern you carry quietly that I don't fully know about?",d11_q2:"What would you need from me if you became seriously ill?",d11_q3:"How do you feel about your body right now — are you at peace with it?",d11_q4:"How do you feel about getting older — does it frighten you, or feel okay?",d11_q5:"Have you thought about what you'd want at the end of your life?",
  d11_b1:"Stop if end-of-life discussion triggers acute anxiety — take it in smaller pieces another time",d11_b2:"Pause if body image vulnerabilities are met with dismissal rather than curiosity",d11_b3:"Step back if caregiving becomes transactional — \"would you stay if I got sick?\" is a test, not a conversation",
  d11_r_eyebrow:"Opening ritual · 8 min",d11_r_name:"The letter to your body",
  d11_r_desc:"Before discussing health and aging, each person takes time to quietly acknowledge the body they're in — with gratitude rather than judgment.",
  d11_rs1:"Take 3 minutes alone to silently complete: \"Dear body, thank you for...\"",d11_rs2:"You don't need to write it — just think it. But write if it helps.",d11_rs3:"Share what came up. Not the whole letter — just one thing you felt grateful for.",d11_rs4:"The listener responds only: \"I'm glad you told me that.\"",d11_rs5:"Begin the date from that place of acceptance.",
  d11_r_why:"Most conversations about health start from fear or deficit. Beginning with gratitude reorients both people toward care rather than anxiety — a fundamentally different emotional starting point.",
  // DATE 12 — POLITICAL VALUES
  d12_title:"Political & Social Values",d12_sub:"What you believe about the world",
  d12_focus:"Political and social values are deeply personal — shaped by childhood, experience, and what you've witnessed. Many couples assume alignment without ever verifying it. This date is about understanding each other's worldview, not agreeing on it.",
  d12_s1:"Share how your political and social values were formed — what experiences shaped them?",d12_s2:"Name the social issue you care most deeply about — and why it feels personal",d12_s3:"Explore where your values genuinely diverge — and whether that feels manageable",d12_s4:"Discuss what you'd want to teach children about fairness, community, and power",d12_s5:"Find one value you share completely and name it aloud together",
  d12_q1:"What political or social issue is closest to your heart — and what made it personal?",d12_q2:"Is there a value of mine that you fundamentally don't share?",d12_q3:"How do you feel when we disagree about something political — threatened, curious, or indifferent?",d12_q4:"Is there a community or cause you wish I cared about more?",d12_q5:"Is there something I believe that quietly worries you?",
  d12_b1:"Stop if the conversation becomes a debate with a right and wrong answer",d12_b2:"Step back if either person begins editing themselves to avoid conflict — silence is not agreement",d12_b3:"Pause if the conversation conflates political views with personal character or intelligence",
  d12_r_eyebrow:"Opening ritual · 5 min",d12_r_name:"The headline",
  d12_r_desc:"Before discussing your values, each person shares one news story from the past week that made them feel something. Not to debate — just to share the feeling.",
  d12_rs1:"Each think of one news story or event from the past week that made you feel something strongly.",d12_rs2:"Share it in one sentence — just the headline.",d12_rs3:"Then say: \"It made me feel [emotion] because...\"",d12_rs4:"The listener responds only to the feeling: \"I understand why that would feel that way.\"",d12_rs5:"Switch. Then begin the date.",
  d12_r_why:"Entering a values conversation through emotion rather than position removes the defensive structure of debate. You're not arguing for a policy — you're sharing what it's like to be you in the world.",
  footer_credit:"A guide to twelve essential conversations for a lasting relationship",footer_sub:"A guide to the conversations that keep love alive",
  formDates:[
    {num:"01",title:"Trust & Commitment",sub:"The foundation of everything else",qs:["When do you feel most secure — and most uncertain — in our relationship?","Have I done something that damaged your trust, even in a small way?","What does loyalty mean to you beyond being faithful?","What would you need from me to feel completely safe?","If our relationship were to end, what would you say broke down first?"]},
    {num:"02",title:"Conflict",sub:"Fighting smarter, not harder",qs:["What do I do when we argue that hurts you the most?","What are you really asking for when we fight about a recurring topic?","How did conflict work in your family growing up?","What would make you feel heard during a disagreement?","Is there a fight we've had that still sits with you — unresolved?"]},
    {num:"03",title:"Sex & Intimacy",sub:"Desire, closeness, and vulnerability",qs:["When do you feel closest to me — physical intimacy, or at other moments?","Is there something about our sex life you've wanted to say but haven't?","How do you feel about how often we are intimate right now?","When I initiate, do you feel desired or pressured?","What would make you feel more emotionally connected before being physical?"]},
    {num:"04",title:"Work & Money",sub:"Values, security, and shared futures",qs:["Was money a source of stress, safety, or something else growing up?","Do you feel financially secure in our relationship right now?","What does financial freedom look like to you?","Is there a financial decision I've made that worried or frustrated you?","Do you feel supported in your career goals — or held back?"]},
    {num:"05",title:"Family",sub:"Roots, roles, and the families we came from",qs:["What's one thing from your upbringing you want us to carry forward?","What pattern from your family are you afraid of repeating?","How was love expressed in your home — words, acts, time?","What did conflict look like in your household — resolved or buried?","What kind of family culture do you want us to create together?"]},
    {num:"06",title:"Play & Adventure",sub:"Fun, spontaneity, and shared joy",qs:["What playful thing we used to do have we stopped — and do you miss it?","What would your ideal spontaneous day with me look like?","Is there something you secretly want to try but haven't mentioned?","Do we laugh enough together? What makes you laugh with me?","What does adventure mean to you — travel, novelty, risk, or something else?"]},
    {num:"07",title:"Growth & Spirituality",sub:"Meaning, purpose, and personal evolution",qs:["What do you believe happens after we die — and does it bring you comfort?","What gives your life the most meaning right now?","Do you feel I support who you're becoming, or who you used to be?","Is there a part of yourself you feel you've lost in our relationship? Or gained?","What would you regret not doing if you knew your time was limited?"]},
    {num:"08",title:"Dreams & Visions",sub:"The future you're building together",qs:["What's a dream you've had since childhood you've never told me about?","If money and fear were removed, what would you do with your life?","What does success look like to you — and does our life reflect that?","What do you want people to say about us as a couple when we're gone?","Is there a dream you're afraid to share because you think I won't support it?"]},
    {num:"09",title:"Mental Health & Wellbeing",sub:"The conversation most couples only have after crisis",qs:["What are your early warning signs that you're struggling emotionally?","What do you need from me when you're not doing well?","Is there a mental health struggle from your past that still shapes you today?","Have I ever made things harder for you without realising it during a difficult period?","What's the most helpful thing I've done for your wellbeing without knowing it?"]},
    {num:"10",title:"Identity & Personal Freedom",sub:"Who are you outside this relationship?",qs:["Is there a version of yourself you feel you've lost since we got together?","Who do you become when you have time completely to yourself?","What do you need from me to feel free to be fully yourself?","Have you quietly given up an ambition or interest for this relationship?","Are we growing in directions that feel compatible to you?"]},
    {num:"11",title:"Aging, Health & the Body",sub:"Physical vulnerability and growing older together",qs:["Is there a health concern you carry quietly that I don't fully know about?","What would you need from me if you became seriously ill?","How do you feel about your body right now — are you at peace with it?","How do you feel about getting older — does it frighten you?","Have you thought about what you'd want at the end of your life?"]},
    {num:"12",title:"Political & Social Values",sub:"What you believe about the world",qs:["What political or social issue is closest to your heart — and what made it personal?","Is there a value of mine that you fundamentally don't share?","How do you feel when we disagree about something political?","Is there a cause or community you wish I cared about more?","Is there something I believe that quietly worries you?"]}
  ]

  moods:["Prepojení","Zraniteľní","Plní nádeje","Náročné","Prekvapení","Vďační"],
  complete_title:"Všetkých dvanásť rande dokončených",complete_sub:"Exportujte odpovede na neskoršiu reflexiu.",export_full:"Stiahnuť úplnú analýzu",
  d1_title:"Dôvera a záväzok",d1_sub:"Základ všetkého ostatného",d1_focus:"Preskúmajte, čo dôvera a záväzok znamenajú pre každého z vás — nielen vernosť, ale aj emocionálna dostupnosť.",d1_s1:"Moment, kedy ste sa cítili skutočne bezpečne",d1_s2:"Záväzok nad rámec vernosti — prítomnosť, úprimnosť",d1_s3:"Skryté obavy: \"Čo by mohlo zničiť náš vzťah?\"",d1_s4:"Spoločný sľub o budúcich porušeniach dôvery",d1_s5:"Uznajte minulé momenty, kedy bola dôvera testovaná",d1_q1:"Kedy sa cítiš najbezpečnejšie — a kedy najneistejšie?",d1_q2:"Urobil/a som niečo, čo poškodilo tvoju dôveru?",d1_q3:"Čo pre teba znamená vernosť?",d1_q4:"Čo by si odo mňa potreboval/a pre úplné bezpečie?",d1_q5:"Keby sa vzťah skončil, čo by si povedal/a, že sa rozpadlo?",d1_b1:"Stop, ak sa to zmení na obviňovanie",d1_b2:"Prestávka pri defenzivite — 20 minút",d1_b3:"Nevynucujte riešenie dnes",d1_r_eyebrow:"Úvodný rituál · 5 min",d1_r_name:"Výmena vďačnosti",d1_r_desc:"Dôvera rastie v malých momentoch uznania.",d1_rs1:"Sadnite si naproti sebe. Spolu sa pomaly nadýchnite.",d1_rs2:"Každý zdieľa konkrétnu vec, vďaka ktorej sa cítil bezpečne.",d1_rs3:"Poslucháč: \"Ďakujem, že si to videl/a.\"",d1_rs4:"Vymeňte roly. Zopakujte.",d1_rs5:"\"Som tu a nikam neodídem.\"",d1_r_why:"Pomenovanie aktov starostlivosti aktivuje bezpečnostnú odpoveď mozgu.",
  d2_title:"Konflikt",d2_sub:"Hádate sa múdrejšie, nie tvrdšie",d2_focus:"Pochopte vzorce konfliktov — nie aby ste vyriešili každý spor, ale aby ste sa naučili, ako každý z vás zvláda napätie.",d2_s1:"Váš štýl konfliktu: eskalácia, stiahnutie alebo vyhýbanie?",d2_s2:"Opakujúci sa spor — váš pocit, nie vina toho druhého",d2_s3:"Skrytý sen za opakujúcim sa sporom",d2_s4:"Opravný signál pri eskalácii",d2_s5:"Ako vyzerá spravodlivý spor pre vás oboch?",d2_q1:"Čo robím pri hádke, čo ti najviac ubližuje?",d2_q2:"O čo skutočne žiadaš pri opakujúcich sa hádkach?",d2_q3:"Ako fungoval konflikt vo vašej rodine?",d2_q4:"Čo by ti pomohlo cítiť sa vypočutý/á?",d2_q5:"Je hádka, ktorá ti stále leží na srdci?",d2_b1:"Stop pri zahltení — búšiace srdce, prázdna myseľ",d2_b2:"Nevracajte sa k obsahu hádky",d2_b3:"Ustúpte pri vymenúvaní sťažností",d2_r_eyebrow:"Úvodný rituál · 5 min",d2_r_name:"Kontrola teploty",d2_r_desc:"Pred rozhovorom o konflikte zistite, kde každý z vás je.",d2_rs1:"Ohodnoťte pocit na stupnici 1–10.",d2_rs2:"Povedzte číslo — bez vysvetlenia.",d2_rs3:"Jedna veta o tom, čo za tým stojí.",d2_rs4:"Nad 7? Počkajte 15 minút.",d2_rs5:"\"Dnes večer sme zvedaví, nie bojovní.\"",d2_r_why:"Kontrola vopred bráni vnášaniu skrytého napätia do rozhovoru.",
  d3_title:"Sex a intimita",d3_sub:"Túžba, blízkosť a zraniteľnosť",d3_focus:"Rozprávajte sa o tom, čo intimita znamená nad rámec fyzického.",d3_s1:"Čo vás robí najviac žiadaným/ou a prepojeným/ou",d3_s2:"Rozdiel medzi sexom a integritou pre každého z vás",d3_s3:"Ako stres a životné zmeny ovplyvňujú vašu túžbu",d3_s4:"Čo by som mohol/a robiť viac? Čo zmeniť?",d3_s5:"Čo pre každého znamená spontánnosť?",d3_q1:"Kedy sa cítiš mi najbližšie?",d3_q2:"Je niečo o našom živote, čo si chcel/a povedať?",d3_q3:"Ako sa cítiš ohľadom frekvencie intímnosti?",d3_q4:"Pri mojej iniciatíve — žiadaný/á alebo pod tlakom?",d3_q5:"Čo by ti pomohlo cítiť sa emocionálne bližšie?",d3_b1:"Stop pri kritike výkonu",d3_b2:"Neporovnávajte so začiatkami vzťahu",d3_b3:"Ustúpte pri vstupe hanby",d3_r_eyebrow:"Úvodný rituál · 3–4 min",d3_r_name:"Dvojminútové objatie",d3_r_desc:"Fyzická blízkosť pred intimitou nie je rozporom.",d3_rs1:"Vstante a objímte sa — skutočné, bez zhonu.",d3_rs2:"Aspoň dve minúty. Bez slov.",d3_rs3:"Všímajte si dych, teplo, napätie.",d3_rs4:"Každý zdieľa jedno slovo.",d3_rs5:"Sadnite. Začnite rande.",d3_r_why:"Dlhé objatie spúšťa oxytocín a znižuje kortizol.",
  d4_title:"Práca a peniaze",d4_sub:"Hodnoty, bezpečie a spoločná budúcnosť",d4_focus:"Peniaze sú o bezpečí, slobode, kontrole a hodnotách — nie o číslach.",d4_s1:"Najrannejšia spomienka na peniaze",d4_s2:"Vaše finančné hodnoty",d4_s3:"Čo pre každého znamená \"dostatok\"?",d4_s4:"Cítite sa v kariére videní a podporovaní?",d4_s5:"Spoločná vízia finančného zabezpečenia",d4_q1:"Peniaze v detstve — stres alebo bezpečie?",d4_q2:"Cítiš sa finančne bezpečne v našom vzťahu?",d4_q3:"Čo pre teba znamená finančná sloboda?",d4_q4:"Finančné rozhodnutie, ktoré ťa znepokojilo?",d4_q5:"Cítiš sa podporovaný/á v kariére?",d4_b1:"Stop pri hľadaní vinníka za minulé chyby",d4_b2:"Nepoužívajte toto rande na vyjednávanie rozpočtu",d4_b3:"Ustúpte pri nevôli kvôli nerovnosti príjmov",d4_r_eyebrow:"Úvodný rituál · 8 min",d4_r_name:"Spomienka na peniaze",d4_r_desc:"Rozhovory o peniazoch bolía, keď sú o číslach.",d4_rs1:"Dve minúty ticha — najrannejšia spomienka na peniaze.",d4_rs2:"Podeľte sa úplne. Poslucháč len počúva.",d4_rs3:"\"Aký pocit zanecháva táto spomienka?\"",d4_rs4:"\"Dáva zmysel, že o peniazoch premýšľaš takto.\"",d4_rs5:"Až potom začnite rande.",d4_r_why:"Vaša finančná osobnosť sa formovala dlho pred stretnutím s partnerom.",
  d5_title:"Rodina",d5_sub:"Korene, roly a rodiny, z ktorých pochádzame",d5_focus:"Vstúpili ste do celej rodinnej histórie vášho partnera, nielen do jeho osobnosti.",d5_s1:"Emocionálna atmosféra vašej rodiny v detstve",d5_s2:"Vzory, ktoré chcete zachovať alebo zanechať",d5_s3:"Roly a očakávania",d5_s4:"Filozofie rodičovstva a obavy",d5_s5:"Čo rodičia urobili správne? Čo by bolo inak?",d5_q1:"Čo z detstva chcete preniesť do vlastnej rodiny?",d5_q2:"Aký vzor z rodiny sa bojíte opakovať?",d5_q3:"Ako sa prejavovala láska vo vašej rodine?",d5_q4:"Ako vyzeral konflikt vo vašej domácnosti?",d5_q5:"Akú rodinnú kultúru chcete vytvoriť?",d5_b1:"Stop pri obvinení rodinám toho druhého",d5_b2:"Pozastavte sa pri neočakávanej traume",d5_b3:"Nesústreďujte sa na napätia so svokrovcami",d5_r_eyebrow:"Úvodný rituál · 7–8 min",d5_r_name:"Ukáž mi jednu vec",d5_r_desc:"Rodina je abstraktná, kým nie je konkrétna.",d5_rs1:"Nájdite fotografiu alebo predmet z detstva.",d5_rs2:"Podeľte sa. Príbeh v 2–3 minútach.",d5_rs3:"\"Čo miluješ najviac na tejto spomienke?\"",d5_rs4:"Položte predmety na viditeľné miesto.",d5_rs5:"Začnite vediac, že ste priviedli rodinu do miestnosti.",d5_r_why:"Predmety obchádzajú defenzívnosť a robia rodinu prítomnou.",
  d6_title:"Zábava a dobrodružstvo",d6_sub:"Radosť, spontánnosť a spoločné potešenie",d6_focus:"Páry, ktoré sa spolu bavia, zostávajú spolu.",d6_s1:"Najšťastnejšia spomienka na hru alebo dobrodružstvo",d6_s2:"Vaše spoločné dobrodružstvo snov",d6_s3:"Aktivity, ktoré vás energizujú verzus povinnosti",d6_s4:"Nová vec, ktorú by ste chceli vyskúšať",d6_s5:"Ako vyzerala zábava na začiatku vzťahu?",d6_q1:"Čo hravé sme prestali robiť a chýba ti to?",d6_q2:"Ideálny spontánny deň so mnou?",d6_q3:"Niečo, čo by si tajne chcel/a vyskúšať?",d6_q4:"Smejeme sa spolu dosť?",d6_q5:"Čo pre teba znamená dobrodružstvo?",d6_b1:"Stop pri katalógu toho, čo chýba",d6_b2:"Neznevažujte partnerovu zábavu",d6_b3:"Ustúpte pri porovnávaní s inými pármi",d6_r_eyebrow:"Úvodný rituál · 3 min",d6_r_name:"60 sekúnd smiešnosti",d6_r_desc:"O hre nemôžete hovoriť vážne.",d6_rs1:"Nastavte časovač na 60 sekúnd.",d6_rs2:"Obaja musíte toho druhého rozosmiať.",d6_rs3:"Ak prvý zlyhá, skúsi druhý.",d6_rs4:"Sadnite si stále s úsmevom.",d6_rs5:"\"Najsmiešnejšia vec, ktorú sme kedy spolu urobili...\"",d6_r_why:"Smiech je nezlučiteľný s úzkosťou.",
  d7_title:"Rast a spiritualita",d7_sub:"Zmysel, účel a osobná evolúcia",d7_focus:"Najhlbšie otázky — čo veríte, čo dáva životu zmysel a ako rastete spolu.",d7_s1:"Čo dáva životu zmysel a účel",d7_s2:"Vaše presvedčenia — duchovné, filozofické alebo svetské",d7_s3:"\"Ako si sa zmenil/a za posledných päť rokov?\"",d7_s4:"Osobný rast a vzájomná podpora",d7_s5:"Rituály zmysluplné pre vás ako pár",d7_q1:"Čo veríš, že sa stane po smrti?",d7_q2:"Čo dáva životu teraz najväčší zmysel?",d7_q3:"Podporujem to, kým sa stávaš?",d7_q4:"Časť seba, ktorú strácaš alebo získavaš?",d7_q5:"Čoho by si ľutoval/a pri obmedzenom čase?",d7_b1:"Stop pri debate o správnosti presvedčení",d7_b2:"Pozastavte sa pri existenciálnych strachoch",d7_b3:"Ustúpte pri tlaku na prevzatie svetonázoru",d7_r_eyebrow:"Úvodný rituál · 8–10 min",d7_r_name:"Spoločné ticho",d7_r_desc:"Toto rande kladie najväčšie otázky.",d7_rs1:"Tiché miesto. Vypnite všetky zvuky.",d7_rs2:"Päť minút úplného ticha.",d7_rs3:"Žiadne telefóny. Žiadne vrtenie.",d7_rs4:"Prvé slovo, ktoré vám prišlo na myseľ.",d7_rs5:"\"Prečo ti prišlo práve to slovo?\"",d7_r_why:"Ticho vytvára vnútornosť — päť minút je viac spájajúcich ako päť minút rozhovoru.",
  d8_title:"Sny a vízie",d8_sub:"Budúcnosť, ktorú budujete spolu",d8_focus:"Záverečné z pôvodných ôsmich rande. Vytvorte spoločnú mapu budúcnosti.",d8_s1:"Každý zdieľa najhlbší osobný sen",d8_s2:"Ideálny spoločný život za desať rokov",d8_s3:"Kde sa sny stretávajú a rozchádzajú?",d8_s4:"Aký odkaz chcete zanechať?",d8_s5:"\"Budujeme život, ktorý...\"",d8_q1:"Sen od detstva, o ktorom si mi nikdy nepovedal/a?",d8_q2:"Bez peňazí a strachu — čo by si robil/a?",d8_q3:"Čo pre teba znamená úspech?",d8_q4:"Čo chceš, aby o nás hovorili?",d8_q5:"Sen, ktorý sa bojíš zdieľať?",d8_b1:"Stop pri \"to nie je realistické\"",d8_b2:"Divergujúce sny nie sú nekompatibilita",d8_b3:"Ustúpte pri úzkosti z budúcnosti",d8_r_eyebrow:"Úvodný rituál · 10 min",d8_r_name:"List budúcnosti",d8_r_desc:"Posledné z pôvodných ôsmich rande.",d8_rs1:"Napíšte list sebe o desať rokov. Päť až osem viet.",d8_rs2:"Päť minút v tichu.",d8_rs3:"Prečítajte nahlas. Bez prerušenia.",d8_rs4:"\"Časť, ktorá ma najviac dojala, bola...\"",d8_rs5:"Zložte listy a uschovajte ich.",d8_r_why:"Písanie aktivuje myslenie o budúcom ja.",
  // NOVÉ RANDE 9
  d9_title:"Duševné zdravie a pohoda",d9_sub:"Rozhovor, ktorý väčšina párov vedie až po kríze",
  d9_focus:"Preskúmajte vaše emocionálne krajiny — podmienky, vzory a potreby, ktoré formujú to, ako každý z vás funguje. Toto nie je terapia; je to predpoklad pre to, byť si navzájom spojencami.",
  d9_s1:"Podeľte sa o svoju osobnú históriu s úzkosťou, depresiou alebo emocionálnymi ťažkosťami",d9_s2:"Opíšte vaše rané varovné signály — ako vyzerá \"nie v poriadku\" pre vás?",d9_s3:"Povedzte partnerovi, čo potrebujete pri ťažkostiach — a čo veci zhoršuje",d9_s4:"Diskutujte o svojom vzťahu k terapii — individuálnej aj párovej",d9_s5:"Spolu vytvorte tichý plán: čo mám urobiť, ak zbadám, že nie si v poriadku?",
  d9_q1:"Aké sú tvoje rané varovné signály, že sa emocionálne trápiš?",d9_q2:"Čo odo mňa potrebuješ, keď nie si v poriadku — priestor, prítomnosť alebo niečo iné?",d9_q3:"Je nejaký duševný boj z minulosti, ktorý stále ovplyvňuje tvoje správanie?",d9_q4:"Spôsobil/a som ti niekedy ťažší čas počas náročného obdobia bez toho, aby som si to uvedomoval/a?",d9_q5:"Čo je najužitočnejšia vec, ktorú som urobil/a pre tvoju pohodu, hoci som o tom ani nevedel/a?",
  d9_b1:"Stop, ak začnete diagnostikovať alebo vysvetľovať ich duševný stav naspäť k nim",d9_b2:"Pozastavte sa, ak sa objaví súčasná kríza — potrebuje skutočnú podporu, nie formát rande",d9_b3:"Ustúpte, ak sa duševné zdravie používa na vysvetlenie zraňujúceho správania namiesto pochopenia",
  d9_r_eyebrow:"Úvodný rituál · 5 min",d9_r_name:"Predpoveď počasia",
  d9_r_desc:"Pred rozhovorom o vnútornej krajine ju zmapujte pomocou jednoduchej metafory. Tým sa odstraňuje tlak na nájdenie správnych slov.",
  d9_rs1:"Každý si dajte 2 minúty ticha a dokončite: \"Moje emocionálne počasie tento týždeň bolo...\"",d9_rs2:"Zdieľajte predpoveď — slnečno, hmla, búrka, premenlivé, pokojné. Bez vysvetlenia.",d9_rs3:"Poslucháč odpovie: \"Povedz mi viac o [slove, ktoré použili].\"",d9_rs4:"Zdieľajte len 2 minúty každý. Neriešte. Neopravujte.",d9_rs5:"Zakončite: \"Som rád/a, že to viem o tebe.\"",
  d9_r_why:"Metafora vytvára odstup od hanby. Počasie nie je ničia vina — jednoducho je. Tým je bezpečnejšie hovoriť o duševných stavoch.",
  // NOVÉ RANDE 10
  d10_title:"Identita a osobná sloboda",d10_sub:"Kto ste mimo tohto vzťahu?",
  d10_focus:"Zdravé vzťahy si vyžadujú, aby každý z partnerov zostal výraznou individualitou. Toto rande je o tých častiach seba, ktoré existujú — alebo kedysi existovali — nezávisle od toho, že ste partnerom niekoho iného.",
  d10_s1:"Podeľte sa o to, kto ste boli pred týmto vzťahom — čo vás definovalo?",d10_s2:"Pomenujte záujmy, ambície alebo návyky, ktoré ste ticho odložili od chvíle, keď ste spolu",d10_s3:"Diskutujte o tom, koľko času sami pre seba skutočne potrebujete a čo vám to obnoví",d10_s4:"Preskúmajte časti seba, ktoré nemôžete plne vyjadriť v tomto vzťahu",d10_s5:"Opýtajte sa navzájom: kým sa stávate — a rastieme kompatibilnými smermi?",
  d10_q1:"Je nejaká verzia teba samého/samej, ktorú si stratil/a alebo potlačil/a, odkedy sme spolu?",d10_q2:"Čo robíš — alebo kým sa stávaš — keď máš čas úplne pre seba?",d10_q3:"Čo odo mňa potrebuješ, aby si sa cítil/a slobodný/á byť plne sám/sama sebou?",d10_q4:"Vzdal/a si sa ticho nejakej ambície alebo záujmu kvôli tomuto vzťahu?",d10_q5:"Rastieme smermi, ktoré sa ti zdajú kompatibilné?",
  d10_b1:"Stop, ak sa rozhovor stane zoznamom toho, čo vzťah stál — to je iný, ťažší rozhovor",d10_b2:"Pozastavte sa, ak strata identity pociťuje veľmi hlboko — môže potrebovať individuálnu terapiu",d10_b3:"Ustúpte, ak sa porovnanie s predchádzajúcim vzťahom alebo ex-partnerom objaví ako referencia",
  d10_r_eyebrow:"Úvodný rituál · 5 min",d10_r_name:"Tri slová",
  d10_r_desc:"Pred rande každý ticho vyberie tri slová, ktoré opisujú, kto je mimo tohto vzťahu. Nie rolu — len seba.",
  d10_rs1:"3 minúty ticha. Každý napíše tri slová pre to, kto je nezávisle od tohto vzťahu.",d10_rs2:"Zdieľajte tri slová jedno po druhom. Zatiaľ bez vysvetlenia.",d10_rs3:"Poslucháč si vyberie to najprekvapivejšie: \"Povedz mi o [tom slove].\"",d10_rs4:"Každý hovorí 2 minúty o tom slove.",d10_rs5:"Zakončite: \"Chcem, aby ste vždy boli touto osobou.\"",
  d10_r_why:"Začiatok tromi slovami odstraňuje úzkosť z prázdnej stránky sebaopisu. Zvyčajne sa objavujú veci, ktoré nikto z vás nečakal.",
  // NOVÉ RANDE 11
  d11_title:"Starnutie, zdravie a telo",d11_sub:"Fyzická zraniteľnosť a starnutie spolu",
  d11_focus:"Rozhovor o telesnosti, zdraví a starnutí je ten, ktorý väčšina párov odkláda, kým ich okolnosti neprinútia. Mať ho skoro — zo zvedavosti, nie zo strachu — mení to, ako obaja partneri zvládajú chorobu, zmenu a plynutie času spolu.",
  d11_s1:"Podeľte sa o rodinnú zdravotnú históriu a čo to môže znamenať pre vašu budúcnosť",d11_s2:"Úprimne hovorte o svojom vzťahu k telu — nielen o vzhľade, ale o vitalite",d11_s3:"Diskutujte o opatrovníctve: čo by ste odo mňa potrebovali, keby ste boli vážne chorý/á?",d11_s4:"Preskúmajte priania na konci života — rozhovor, ktorý chráni vás oboch",d11_s5:"Hovorte o starých rodičoch: akú zodpovednosť každý cítite a ako to ovplyvňuje nás",
  d11_q1:"Je nejaký zdravotný problém, ktorý ticho nesieš a ktorý plne nepoznám?",d11_q2:"Čo by si odo mňa potreboval/a, keby si vážne ochorel/a?",d11_q3:"Ako sa cítiš ohľadom svojho tela — si s ním v mieri?",d11_q4:"Ako sa cítiš pri myšlienke na starnutie — straší ťa to alebo ti to príde v poriadku?",d11_q5:"Premýšľal/a si o tom, čo by si chcel/a na konci svojho života?",
  d11_b1:"Stop, ak diskusia o konci života vyvolá akútnu úzkosť — vezmite to v menších kúskoch inokedy",d11_b2:"Pozastavte sa, ak sa zraniteľnosti ohľadom imidžu tela stretávajú s odmietnutím namiesto zvedavosti",d11_b3:"Ustúpte, ak sa opatrovníctvo stáva transakčným — \"zostal/a by si, keby som ochorel/a?\" je test, nie rozhovor",
  d11_r_eyebrow:"Úvodný rituál · 8 min",d11_r_name:"List telu",
  d11_r_desc:"Pred diskusiou o zdraví a starnutí každý ticho uzná telo, v ktorom je — s vďačnosťou, nie súdom.",
  d11_rs1:"3 minúty ticha. Dokončite: \"Drahé telo, ďakujem ti za...\"",d11_rs2:"Nemusíte to písať — stačí si to myslieť. Ale píšte, ak chcete.",d11_rs3:"Podeľte sa o to, čo sa objavilo. Nie celý list — len jednu vec, za ktorú ste vďační.",d11_rs4:"Poslucháč odpovie len: \"Som rád/a, že si mi to povedal/a.\"",d11_rs5:"Začnite rande z toho miesta prijatia.",
  d11_r_why:"Väčšina rozhovorov o zdraví začína zo strachu alebo deficitu. Začiatok s vďačnosťou preorientuje oboch smerom k starostlivosti.",
  // NOVÉ RANDE 12
  d12_title:"Politické a spoločenské hodnoty",d12_sub:"Čomu veríte ohľadom sveta",
  d12_focus:"Politické a spoločenské hodnoty sú hlboko osobné — formované detstvom, skúsenosťami a tým, čo ste svedkami. Mnohé páry predpokladajú zhodu bez toho, aby ju overili. Toto rande je o pochopení svetonázoru toho druhého, nie o súhlase s ním.",
  d12_s1:"Podeľte sa o to, ako boli formované vaše politické a spoločenské hodnoty",d12_s2:"Pomenujte spoločenskú otázku, na ktorej vám najviac záleží — a prečo je osobná",d12_s3:"Preskúmajte, kde sa vaše hodnoty skutočne rozchádzajú — a či to zvládate",d12_s4:"Diskutujte o tom, čo by ste chceli naučiť deti o spravodlivosti, komunite a moci",d12_s5:"Nájdite jednu hodnotu, ktorú úplne zdieľate a pomenujte ju nahlas spolu",
  d12_q1:"Aká politická alebo spoločenská otázka ti je najbližšia — a čo ju urobilo osobnou?",d12_q2:"Je nejaká moja hodnota, ktorú zásadne nezdieľaš?",d12_q3:"Ako sa cítiš, keď sa hádame o niečom politickom — ohrozene, so zvedavosťou alebo ľahostajne?",d12_q4:"Je nejaká komunita alebo vec, o ktorú by si si prial/a, aby som sa viac staral/a?",d12_q5:"Je niečo, čomu verím a čo ťa ticho znepokojuje?",
  d12_b1:"Stop, ak sa rozhovor stane debatou so správnou a nesprávnou odpoveďou",d12_b2:"Ustúpte, ak sa niektorý z partnerov začína upravovať, aby sa vyhol konfliktu — ticho nie je súhlas",d12_b3:"Pozastavte sa, ak rozhovor stotožňuje politické názory s osobným charakterom alebo inteligenciou",
  d12_r_eyebrow:"Úvodný rituál · 5 min",d12_r_name:"Titulok správ",
  d12_r_desc:"Pred diskusiou o hodnotách každý zdieľa jednu správu z minulého týždňa, ktorá v ňom niečo vyvolala. Nie na debatu — len na zdieľanie pocitu.",
  d12_rs1:"Každý si premyslí jednu správu alebo udalosť z minulého týždňa, ktorá vo vás vyvolala silný pocit.",d12_rs2:"Zdieľajte ju v jednej vete — len titulok.",d12_rs3:"Potom povedzte: \"Cítil/a som [emócia], pretože...\"",d12_rs4:"Poslucháč reaguje len na pocit: \"Rozumiem, prečo by si sa takto cítil/a.\"",d12_rs5:"Vymeňte roly. Potom začnite rande.",
  d12_r_why:"Vstup do rozhovoru o hodnotách cez emóciu namiesto pozície odstraňuje defenzívnu štruktúru debaty.",

  d1_title:"Důvěra a závazek",d1_sub:"Základ všeho ostatního",d1_focus:"Prozkoumejte, co důvěra a závazek znamenají pro každého — nejen věrnost, ale emocionální dostupnost.",d1_s1:"Moment, kdy jste se cítili skutečně bezpečně",d1_s2:"Závazek nad rámec věrnosti — přítomnost, upřímnost",d1_s3:"Skryté obavy: \"Co by mohlo zničit náš vztah?\"",d1_s4:"Společný slib o budoucích porušeních důvěry",d1_s5:"Uznejte minulé momenty, kdy byla důvěra testována",d1_q1:"Kdy se cítíš nejbezpečněji — a kdy nejistěji?",d1_q2:"Udělal/a jsem něco, co poškodilo tvou důvěru?",d1_q3:"Co pro tebe znamená věrnost?",d1_q4:"Co bys potřeboval/a pro úplné bezpečí?",d1_q5:"Kdyby se vztah skončil, co se rozpadlo?",d1_b1:"Stop, pokud se to změní v obviňování",d1_b2:"Přestávka při defenzivitě — 20 minut",d1_b3:"Nevynucujte řešení dnes",d1_r_eyebrow:"Úvodní rituál · 5 min",d1_r_name:"Výměna vděčnosti",d1_r_desc:"Důvěra roste v malých momentech uznání.",d1_rs1:"Sedněte naproti sobě. Pomalu se nadechněte.",d1_rs2:"Každý sdílí konkrétní věc, díky které se cítil bezpečně.",d1_rs3:"Posluchač: \"Díky, že jsi to viděl/a.\"",d1_rs4:"Vyměňte role. Opakujte.",d1_rs5:"\"Jsem tu a nikam neodcházím.\"",d1_r_why:"Pojmenování aktů péče aktivuje bezpečnostní odpověď mozku.",

let lang = localStorage.getItem('lang') || 'en';
let currentView = 'guide';
let formData = JSON.parse(localStorage.getItem('twelve-dates-form') || '{}');

function switchView() {
  currentView = currentView === 'guide' ? 'form' : 'guide';
  document.body.className = 'view-' + currentView;
  const btn = document.getElementById('mydate-tab');
  btn.classList.toggle('active', currentView === 'form');
  btn.textContent = currentView === 'form' ? (T[lang].nav_before_short || 'Guide') : (T[lang].mydate_tab || 'My Date');
  window.scrollTo(0, 0);
  if (currentView === 'form') { buildFormBlocks(); loadFormData(); }
}

function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  ['en','sk','cz'].forEach(x => document.getElementById('btn-'+x).classList.toggle('active', x===l));
  document.documentElement.lang = l;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[l][el.getAttribute('data-i18n')];
    if (v !== undefined) el.textContent = v;
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const v = T[l][el.getAttribute('data-i18n-html')];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const v = T[l][el.getAttribute('data-i18n-placeholder')];
    if (v !== undefined) el.placeholder = v;
  });
  const btn = document.getElementById('mydate-tab');
  btn.textContent = currentView === 'form' ? (T[l].nav_before_short || 'Guide') : (T[l].mydate_tab || 'My Date');
  if (currentView === 'form') { buildFormBlocks(); loadFormData(); }
}

function buildFormBlocks() {
  const container = document.getElementById('form-dates-container');
  container.innerHTML = '';
  const d = T[lang];
  d.formDates.forEach((date, di) => {
    const block = document.createElement('div');
    block.className = `date-block fb${di+1}`;
    const qRows = date.qs.map((q, qi) => `
      <div class="question-row">
        <div class="q-label">${q}</div>
        <div class="answers-grid">
          <div class="answer-group"><label>${d.label_p1}</label><textarea data-key="d${di+1}_q${qi+1}_p1" placeholder="..." oninput="autoSave()" rows="3"></textarea></div>
          <div class="answer-group"><label>${d.label_p2}</label><textarea data-key="d${di+1}_q${qi+1}_p2" placeholder="..." oninput="autoSave()" rows="3"></textarea></div>
        </div>
      </div>`).join('');
    const moodChips = d.moods.map((m,mi) => `<button class="mood-chip" data-key="d${di+1}_mood" data-val="${mi}" onclick="toggleMood(this)">${m}</button>`).join('');
    const stars = [1,2,3,4,5].map(n => `<button class="star" data-key="d${di+1}_rating" data-val="${n}" onclick="setRating(this,${di+1})">${n}</button>`).join('');
    block.innerHTML = `
      <div class="date-block-header">
        <div class="date-num-badge">${date.num}</div>
        <div class="date-block-meta"><h3>${date.title}</h3><p>${date.sub}</p>
          <div class="date-done-row"><span class="date-done-label">${d.label_done}</span><input type="date" class="date-done-input" data-key="d${di+1}_datedon" oninput="autoSave()"></div>
        </div>
      </div>
      <div class="date-block-body">
        ${qRows}
        <div class="notes-row"><label>${d.label_notes}</label><textarea data-key="d${di+1}_notes" placeholder="${d.notes_placeholder}" oninput="autoSave()" rows="3"></textarea></div>
        <div class="rating-row"><span class="rating-label">${d.label_rating}</span><div class="stars">${stars}</div></div>
        <div class="mood-row">${moodChips}</div>
      </div>`;
    container.appendChild(block);
  });
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, {threshold: 0.05});
  container.querySelectorAll('.date-block').forEach(b => obs.observe(b));
}

function setRating(btn, di) {
  const val = parseInt(btn.getAttribute('data-val'));
  formData[`d${di}_rating`] = val;
  document.querySelectorAll(`[data-key="d${di}_rating"]`).forEach(b => {
    b.classList.toggle('active', parseInt(b.getAttribute('data-val')) <= val);
  });
  autoSave();
}

function toggleMood(btn) {
  const key = btn.getAttribute('data-key');
  const val = parseInt(btn.getAttribute('data-val'));
  const current = formData[key] || [];
  const idx = current.indexOf(val);
  if (idx > -1) current.splice(idx, 1); else current.push(val);
  formData[key] = current;
  document.querySelectorAll(`[data-key="${key}"]`).forEach(b => {
    b.classList.toggle('active', current.includes(parseInt(b.getAttribute('data-val'))));
  });
  autoSave();
}

function autoSave() {
  document.querySelectorAll('textarea, input[data-key]').forEach(el => {
    const key = el.getAttribute('data-key');
    if (key) formData[key] = el.value;
  });
  formData.partner1 = document.getElementById('partner1')?.value || '';
  formData.partner2 = document.getElementById('partner2')?.value || '';
  formData.startDate = document.getElementById('start-date')?.value || '';
  localStorage.setItem('twelve-dates-form', JSON.stringify(formData));
  const ind = document.getElementById('save-indicator');
  if (ind) { ind.classList.add('saved'); setTimeout(() => ind.classList.remove('saved'), 1800); }
  updateProgress(); checkCompletion();
}

function loadFormData() {
  const p1 = document.getElementById('partner1');
  const p2 = document.getElementById('partner2');
  const sd = document.getElementById('start-date');
  if (p1) p1.value = formData.partner1 || '';
  if (p2) p2.value = formData.partner2 || '';
  if (sd) sd.value = formData.startDate || '';
  document.querySelectorAll('[data-key]').forEach(el => {
    const key = el.getAttribute('data-key');
    if (!key || formData[key] === undefined) return;
    if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') el.value = formData[key];
    if (el.classList.contains('star')) el.classList.toggle('active', parseInt(el.getAttribute('data-val')) <= formData[key]);
    if (el.classList.contains('mood-chip')) {
      const moods = formData[key] || [];
      el.classList.toggle('active', moods.includes(parseInt(el.getAttribute('data-val'))));
    }
  });
  updateProgress();
}

function updateProgress() {
  const fields = document.querySelectorAll('#form-dates-container textarea');
  const filled = [...fields].filter(f => f.value.trim().length > 5).length;
  const pct = fields.length ? Math.round((filled / fields.length) * 100) : 0;
  const bar = document.getElementById('progress');
  if (bar) bar.style.width = pct + '%';
}

function checkCompletion() {
  const d = T[lang];
  const allFilled = d.formDates.every((_, di) =>
    d.formDates[di].qs.every((_, qi) => {
      const v1 = formData[`d${di+1}_q${qi+1}_p1`] || '';
      const v2 = formData[`d${di+1}_q${qi+1}_p2`] || '';
      return v1.trim().length > 2 || v2.trim().length > 2;
    })
  );
  const banner = document.getElementById('completion-banner');
  if (banner) banner.classList.toggle('show', allFilled);
}

function exportAnswers() {
  const d = T[lang];
  const p1 = formData.partner1 || 'Partner 1';
  const p2 = formData.partner2 || 'Partner 2';
  let out = `TWELVE DATES — ANSWERS\n${'='.repeat(50)}\n${p1} & ${p2}`;
  if (formData.startDate) out += ` · Started: ${formData.startDate}`;
  out += `\nExported: ${new Date().toLocaleDateString()}\n`;
  d.formDates.forEach((date, di) => {
    out += `\n${'─'.repeat(50)}\nDATE ${date.num}: ${date.title.toUpperCase()}\n${date.sub}\n`;
    const done = formData[`d${di+1}_datedon`];
    if (done) out += `Completed: ${done}\n`;
    const rating = formData[`d${di+1}_rating`];
    if (rating) out += `Rating: ${'★'.repeat(rating)}${'☆'.repeat(5-rating)}\n`;
    const moods = formData[`d${di+1}_mood`] || [];
    if (moods.length) out += `Mood: ${moods.map(m => d.moods[m]).join(', ')}\n`;
    out += '\n';
    date.qs.forEach((q, qi) => {
      out += `Q${qi+1}: ${q}\n`;
      out += `  ${p1}: ${formData[`d${di+1}_q${qi+1}_p1`] || '—'}\n`;
      out += `  ${p2}: ${formData[`d${di+1}_q${qi+1}_p2`] || '—'}\n\n`;
    });
    const notes = formData[`d${di+1}_notes`];
    if (notes) out += `Notes: ${notes}\n`;
  });
  const blob = new Blob([out], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `twelve-dates-${p1.toLowerCase().replace(/\s/g,'-')}.txt`;
  a.click();
}

// ── IMPORT ──────────────────────────────────────────────────
function handleImport(input) {
  const file = input.files[0];
  input.value = '';
  if (!file) return;
  if (!file.name.endsWith('.txt')) { showToast(T[lang].import_error, true); return; }
  const reader = new FileReader();
  reader.onerror = () => showToast(T[lang].import_error, true);
  reader.onload = e => {
    try { parseImport(e.target.result); }
    catch(err) { showToast(T[lang].import_error, true); }
  };
  reader.readAsText(file, 'utf-8');
}

function parseImport(text) {
  // Must be a valid export file
  if (!text.startsWith('TWELVE DATES — ANSWERS')) {
    showToast(T[lang].import_error, true); return;
  }

  const SEP = '─'.repeat(50);
  const blocks = text.split(SEP);

  // ── Header: extract partner names + start date
  const headerLines = blocks[0].split('\n');
  let p1Name = '', p2Name = '', startDate = '';
  for (const line of headerLines) {
    if (line.includes(' & ')) {
      const dotParts = line.split(' · ');
      const names = dotParts[0].split(' & ');
      p1Name = names[0].trim();
      p2Name = (names[1] || '').trim();
      if (dotParts[1] && dotParts[1].startsWith('Started: ')) {
        startDate = dotParts[1].replace('Started: ', '').trim();
      }
      break;
    }
  }

  if (p1Name) formData.partner1 = p1Name;
  if (p2Name) formData.partner2 = p2Name;
  if (startDate) formData.startDate = startDate;

  const p1 = p1Name || 'Partner 1';
  const p2 = p2Name || 'Partner 2';
  const d = T[lang];

  // ── Date blocks
  for (let bi = 1; bi < blocks.length; bi++) {
    const block = blocks[bi];

    // Find date index from "DATE 01:" pattern
    const dateNumMatch = block.match(/DATE (\d{2}):/);
    if (!dateNumMatch) continue;
    const di = parseInt(dateNumMatch[1]); // 1–12

    // Completed date
    const completedMatch = block.match(/Completed: ([^\n]+)/);
    if (completedMatch) formData[`d${di}_datedon`] = completedMatch[1].trim();

    // Rating — count filled stars
    const ratingMatch = block.match(/Rating: (★+)/);
    if (ratingMatch) formData[`d${di}_rating`] = ratingMatch[1].length;

    // Moods — match label names back to indices
    const moodLineMatch = block.match(/Mood: ([^\n]+)/);
    if (moodLineMatch) {
      const labels = d.moods;
      const named = moodLineMatch[1].split(',').map(m => m.trim());
      // Try current lang first, then fall back to all langs
      let indices = named.map(m => labels.indexOf(m)).filter(i => i >= 0);
      if (indices.length === 0) {
        // Attempt EN fallback (file may have been exported in different lang)
        const enLabels = T['en'].moods;
        indices = named.map(m => enLabels.indexOf(m)).filter(i => i >= 0);
      }
      if (indices.length > 0) formData[`d${di}_mood`] = indices;
    }

    // Questions — split by "Q1:", "Q2:" etc.
    // Pattern: Qn: question text\n  P1name: answer\n  P2name: answer\n\n
    const p1Prefix = `  ${p1}: `;
    const p2Prefix = `  ${p2}: `;

    // Split block into per-question chunks
    const qSplit = block.split(/\nQ(\d+): [^\n]*\n/);
    // qSplit is: [pre, qi, content, qi, content, ...]
    for (let si = 1; si < qSplit.length; si += 2) {
      const qi = parseInt(qSplit[si]);
      const chunk = qSplit[si + 1] || '';

      const p1Idx = chunk.indexOf(p1Prefix);
      const p2Idx = chunk.indexOf(p2Prefix);

      if (p1Idx !== -1) {
        const start = p1Idx + p1Prefix.length;
        // P1 answer ends where P2 begins (or end of chunk)
        const end = p2Idx > p1Idx ? p2Idx : chunk.length;
        const ans = chunk.substring(start, end).replace(/\n/g, ' ').trim();
        if (ans && ans !== '—') formData[`d${di}_q${qi}_p1`] = ans;
      }

      if (p2Idx !== -1) {
        const start = p2Idx + p2Prefix.length;
        const ans = chunk.substring(start).replace(/\n\n[\s\S]*$/, '').replace(/\n/g, ' ').trim();
        if (ans && ans !== '—') formData[`d${di}_q${qi}_p2`] = ans;
      }
    }

    // Notes — everything after "Notes: " to end of block
    const notesMatch = block.match(/\nNotes: ([\s\S]+?)$/);
    if (notesMatch) {
      const notes = notesMatch[1].trim();
      if (notes) formData[`d${di}_notes`] = notes;
    }
  }

  // Persist and refresh UI
  localStorage.setItem('twelve-dates-form', JSON.stringify(formData));

  // Update header fields directly (they may not have data-key attributes)
  const p1El = document.getElementById('partner1');
  const p2El = document.getElementById('partner2');
  const sdEl = document.getElementById('start-date');
  if (p1El) p1El.value = formData.partner1 || '';
  if (p2El) p2El.value = formData.partner2 || '';
  if (sdEl) sdEl.value = formData.startDate || '';

  // Rebuild and repopulate the form (handles new language if needed)
  buildFormBlocks();
  loadFormData();
  updateProgress();
  checkCompletion();

  showToast(T[lang].import_success);
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); }});
}, {threshold: 0.08}).observe && document.querySelectorAll('.date-section').forEach(el =>
  new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, {threshold: 0.08}).observe(el)
);

setLang(lang);
</script>
