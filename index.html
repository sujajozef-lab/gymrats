let lang = localStorage.getItem('lang') || 'en';
let currentView = 'guide';
let formData = JSON.parse(localStorage.getItem('twelve-dates-form') || '{}');

function switchView() {
  currentView = currentView === 'guide' ? 'form' : 'guide';
  document.body.className = 'view-' + currentView;
  const btn = document.getElementById('mydate-tab');
  btn.classList.toggle('active', currentView === 'form');
  btn.textContent = currentView === 'form' ? (T[lang].nav_before_short || 'Guide') : (T[lang].mydate_tab || 'My Date');
  window.scrollTo(0, 0);
  if (currentView === 'form') { buildFormBlocks(); loadFormData(); }
}

function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  ['en','sk','cz'].forEach(x => document.getElementById('btn-'+x).classList.toggle('active', x===l));
  document.documentElement.lang = l;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[l][el.getAttribute('data-i18n')];
    if (v !== undefined) el.textContent = v;
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const v = T[l][el.getAttribute('data-i18n-html')];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const v = T[l][el.getAttribute('data-i18n-placeholder')];
    if (v !== undefined) el.placeholder = v;
  });
  const btn = document.getElementById('mydate-tab');
  btn.textContent = currentView === 'form' ? (T[l].nav_before_short || 'Guide') : (T[l].mydate_tab || 'My Date');
  if (currentView === 'form') { buildFormBlocks(); loadFormData(); }
}

function buildFormBlocks() {
  const container = document.getElementById('form-dates-container');
  container.innerHTML = '';
  const d = T[lang];
  d.formDates.forEach((date, di) => {
    const block = document.createElement('div');
    block.className = `date-block fb${di+1}`;
    const qRows = date.qs.map((q, qi) => `
      <div class="question-row">
        <div class="q-label">${q}</div>
        <div class="answers-grid">
          <div class="answer-group"><label>${d.label_p1}</label><textarea data-key="d${di+1}_q${qi+1}_p1" placeholder="..." oninput="autoSave()" rows="3"></textarea></div>
          <div class="answer-group"><label>${d.label_p2}</label><textarea data-key="d${di+1}_q${qi+1}_p2" placeholder="..." oninput="autoSave()" rows="3"></textarea></div>
        </div>
      </div>`).join('');
    const moodChips = d.moods.map((m,mi) => `<button class="mood-chip" data-key="d${di+1}_mood" data-val="${mi}" onclick="toggleMood(this)">${m}</button>`).join('');
    const stars = [1,2,3,4,5].map(n => `<button class="star" data-key="d${di+1}_rating" data-val="${n}" onclick="setRating(this,${di+1})">${n}</button>`).join('');
    block.innerHTML = `
      <div class="date-block-header">
        <div class="date-num-badge">${date.num}</div>
        <div class="date-block-meta"><h3>${date.title}</h3><p>${date.sub}</p>
          <div class="date-done-row"><span class="date-done-label">${d.label_done}</span><input type="date" class="date-done-input" data-key="d${di+1}_datedon" oninput="autoSave()"></div>
        </div>
      </div>
      <div class="date-block-body">
        ${qRows}
        <div class="notes-row"><label>${d.label_notes}</label><textarea data-key="d${di+1}_notes" placeholder="${d.notes_placeholder}" oninput="autoSave()" rows="3"></textarea></div>
        <div class="rating-row"><span class="rating-label">${d.label_rating}</span><div class="stars">${stars}</div></div>
        <div class="mood-row">${moodChips}</div>
      </div>`;
    container.appendChild(block);
  });
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, {threshold: 0.05});
  container.querySelectorAll('.date-block').forEach(b => obs.observe(b));
}

function setRating(btn, di) {
  const val = parseInt(btn.getAttribute('data-val'));
  formData[`d${di}_rating`] = val;
  document.querySelectorAll(`[data-key="d${di}_rating"]`).forEach(b => {
    b.classList.toggle('active', parseInt(b.getAttribute('data-val')) <= val);
  });
  autoSave();
}

function toggleMood(btn) {
  const key = btn.getAttribute('data-key');
  const val = parseInt(btn.getAttribute('data-val'));
  const current = formData[key] || [];
  const idx = current.indexOf(val);
  if (idx > -1) current.splice(idx, 1); else current.push(val);
  formData[key] = current;
  document.querySelectorAll(`[data-key="${key}"]`).forEach(b => {
    b.classList.toggle('active', current.includes(parseInt(b.getAttribute('data-val'))));
  });
  autoSave();
}

function autoSave() {
  document.querySelectorAll('textarea, input[data-key]').forEach(el => {
    const key = el.getAttribute('data-key');
    if (key) formData[key] = el.value;
  });
  formData.partner1 = document.getElementById('partner1')?.value || '';
  formData.partner2 = document.getElementById('partner2')?.value || '';
  formData.startDate = document.getElementById('start-date')?.value || '';
  localStorage.setItem('twelve-dates-form', JSON.stringify(formData));
  const ind = document.getElementById('save-indicator');
  if (ind) { ind.classList.add('saved'); setTimeout(() => ind.classList.remove('saved'), 1800); }
  updateProgress(); checkCompletion();
}

function loadFormData() {
  const p1 = document.getElementById('partner1');
  const p2 = document.getElementById('partner2');
  const sd = document.getElementById('start-date');
  if (p1) p1.value = formData.partner1 || '';
  if (p2) p2.value = formData.partner2 || '';
  if (sd) sd.value = formData.startDate || '';
  document.querySelectorAll('[data-key]').forEach(el => {
    const key = el.getAttribute('data-key');
    if (!key || formData[key] === undefined) return;
    if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') el.value = formData[key];
    if (el.classList.contains('star')) el.classList.toggle('active', parseInt(el.getAttribute('data-val')) <= formData[key]);
    if (el.classList.contains('mood-chip')) {
      const moods = formData[key] || [];
      el.classList.toggle('active', moods.includes(parseInt(el.getAttribute('data-val'))));
    }
  });
  updateProgress();
}

function updateProgress() {
  const fields = document.querySelectorAll('#form-dates-container textarea');
  const filled = [...fields].filter(f => f.value.trim().length > 5).length;
  const pct = fields.length ? Math.round((filled / fields.length) * 100) : 0;
  const bar = document.getElementById('progress');
  if (bar) bar.style.width = pct + '%';
}

function checkCompletion() {
  const d = T[lang];
  const allFilled = d.formDates.every((_, di) =>
    d.formDates[di].qs.every((_, qi) => {
      const v1 = formData[`d${di+1}_q${qi+1}_p1`] || '';
      const v2 = formData[`d${di+1}_q${qi+1}_p2`] || '';
      return v1.trim().length > 2 || v2.trim().length > 2;
    })
  );
  const banner = document.getElementById('completion-banner');
  if (banner) banner.classList.toggle('show', allFilled);
}

function exportAnswers() {
  const d = T[lang];
  const p1 = formData.partner1 || 'Partner 1';
  const p2 = formData.partner2 || 'Partner 2';
  let out = `TWELVE DATES — ANSWERS\n${'='.repeat(50)}\n${p1} & ${p2}`;
  if (formData.startDate) out += ` · Started: ${formData.startDate}`;
  out += `\nExported: ${new Date().toLocaleDateString()}\n`;
  d.formDates.forEach((date, di) => {
    out += `\n${'─'.repeat(50)}\nDATE ${date.num}: ${date.title.toUpperCase()}\n${date.sub}\n`;
    const done = formData[`d${di+1}_datedon`];
    if (done) out += `Completed: ${done}\n`;
    const rating = formData[`d${di+1}_rating`];
    if (rating) out += `Rating: ${'★'.repeat(rating)}${'☆'.repeat(5-rating)}\n`;
    const moods = formData[`d${di+1}_mood`] || [];
    if (moods.length) out += `Mood: ${moods.map(m => d.moods[m]).join(', ')}\n`;
    out += '\n';
    date.qs.forEach((q, qi) => {
      out += `Q${qi+1}: ${q}\n`;
      out += `  ${p1}: ${formData[`d${di+1}_q${qi+1}_p1`] || '—'}\n`;
      out += `  ${p2}: ${formData[`d${di+1}_q${qi+1}_p2`] || '—'}\n\n`;
    });
    const notes = formData[`d${di+1}_notes`];
    if (notes) out += `Notes: ${notes}\n`;
  });
  const blob = new Blob([out], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `twelve-dates-${p1.toLowerCase().replace(/\s/g,'-')}.txt`;
  a.click();
}

// ── IMPORT ──────────────────────────────────────────────────
function handleImport(input) {
  const file = input.files[0];
  input.value = '';
  if (!file) return;
  if (!file.name.endsWith('.txt')) { showToast(T[lang].import_error, true); return; }
  const reader = new FileReader();
  reader.onerror = () => showToast(T[lang].import_error, true);
  reader.onload = e => {
    try { parseImport(e.target.result); }
    catch(err) { showToast(T[lang].import_error, true); }
  };
  reader.readAsText(file, 'utf-8');
}

function parseImport(text) {
  // Must be a valid export file
  if (!text.startsWith('TWELVE DATES — ANSWERS')) {
    showToast(T[lang].import_error, true); return;
  }

  const SEP = '─'.repeat(50);
  const blocks = text.split(SEP);

  // ── Header: extract partner names + start date
  const headerLines = blocks[0].split('\n');
  let p1Name = '', p2Name = '', startDate = '';
  for (const line of headerLines) {
    if (line.includes(' & ')) {
      const dotParts = line.split(' · ');
      const names = dotParts[0].split(' & ');
      p1Name = names[0].trim();
      p2Name = (names[1] || '').trim();
      if (dotParts[1] && dotParts[1].startsWith('Started: ')) {
        startDate = dotParts[1].replace('Started: ', '').trim();
      }
      break;
    }
  }

  if (p1Name) formData.partner1 = p1Name;
  if (p2Name) formData.partner2 = p2Name;
  if (startDate) formData.startDate = startDate;

  const p1 = p1Name || 'Partner 1';
  const p2 = p2Name || 'Partner 2';
  const d = T[lang];

  // ── Date blocks
  for (let bi = 1; bi < blocks.length; bi++) {
    const block = blocks[bi];

    // Find date index from "DATE 01:" pattern
    const dateNumMatch = block.match(/DATE (\d{2}):/);
    if (!dateNumMatch) continue;
    const di = parseInt(dateNumMatch[1]); // 1–12

    // Completed date
    const completedMatch = block.match(/Completed: ([^\n]+)/);
    if (completedMatch) formData[`d${di}_datedon`] = completedMatch[1].trim();

    // Rating — count filled stars
    const ratingMatch = block.match(/Rating: (★+)/);
    if (ratingMatch) formData[`d${di}_rating`] = ratingMatch[1].length;

    // Moods — match label names back to indices
    const moodLineMatch = block.match(/Mood: ([^\n]+)/);
    if (moodLineMatch) {
      const labels = d.moods;
      const named = moodLineMatch[1].split(',').map(m => m.trim());
      // Try current lang first, then fall back to all langs
      let indices = named.map(m => labels.indexOf(m)).filter(i => i >= 0);
      if (indices.length === 0) {
        // Attempt EN fallback (file may have been exported in different lang)
        const enLabels = T['en'].moods;
        indices = named.map(m => enLabels.indexOf(m)).filter(i => i >= 0);
      }
      if (indices.length > 0) formData[`d${di}_mood`] = indices;
    }

    // Questions — split by "Q1:", "Q2:" etc.
    // Pattern: Qn: question text\n  P1name: answer\n  P2name: answer\n\n
    const p1Prefix = `  ${p1}: `;
    const p2Prefix = `  ${p2}: `;

    // Split block into per-question chunks
    const qSplit = block.split(/\nQ(\d+): [^\n]*\n/);
    // qSplit is: [pre, qi, content, qi, content, ...]
    for (let si = 1; si < qSplit.length; si += 2) {
      const qi = parseInt(qSplit[si]);
      const chunk = qSplit[si + 1] || '';

      const p1Idx = chunk.indexOf(p1Prefix);
      const p2Idx = chunk.indexOf(p2Prefix);

      if (p1Idx !== -1) {
        const start = p1Idx + p1Prefix.length;
        // P1 answer ends where P2 begins (or end of chunk)
        const end = p2Idx > p1Idx ? p2Idx : chunk.length;
        const ans = chunk.substring(start, end).replace(/\n/g, ' ').trim();
        if (ans && ans !== '—') formData[`d${di}_q${qi}_p1`] = ans;
      }

      if (p2Idx !== -1) {
        const start = p2Idx + p2Prefix.length;
        const ans = chunk.substring(start).replace(/\n\n[\s\S]*$/, '').replace(/\n/g, ' ').trim();
        if (ans && ans !== '—') formData[`d${di}_q${qi}_p2`] = ans;
      }
    }

    // Notes — everything after "Notes: " to end of block
    const notesMatch = block.match(/\nNotes: ([\s\S]+?)$/);
    if (notesMatch) {
      const notes = notesMatch[1].trim();
      if (notes) formData[`d${di}_notes`] = notes;
    }
  }

  // Persist and refresh UI
  localStorage.setItem('twelve-dates-form', JSON.stringify(formData));

  // Update header fields directly (they may not have data-key attributes)
  const p1El = document.getElementById('partner1');
  const p2El = document.getElementById('partner2');
  const sdEl = document.getElementById('start-date');
  if (p1El) p1El.value = formData.partner1 || '';
  if (p2El) p2El.value = formData.partner2 || '';
  if (sdEl) sdEl.value = formData.startDate || '';

  // Rebuild and repopulate the form (handles new language if needed)
  buildFormBlocks();
  loadFormData();
  updateProgress();
  checkCompletion();

  showToast(T[lang].import_success);
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); }});
}, {threshold: 0.08}).observe && document.querySelectorAll('.date-section').forEach(el =>
  new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, {threshold: 0.08}).observe(el)
);

setLang(lang);
</script>
</body>
