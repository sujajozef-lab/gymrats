<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twelve Dates</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F8F3EC;--cream-dark:#EFE8DD;--cream-mid:#F3EDE3;
  --ink:#1C1510;--ink-soft:#4A3F35;--ink-muted:#8A7A6E;
  --rose:#C4756A;--rose-pale:#FBF0EE;
  --gold:#B8975A;--gold-light:#F2E8D5;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.7;min-height:100vh;overflow-x:hidden;}

.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:4rem 2rem;position:relative;overflow:hidden;background:var(--ink);}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 80%,rgba(196,117,106,.18) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 20%,rgba(184,151,90,.12) 0%,transparent 55%);pointer-events:none;}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(3.5rem,9vw,7rem);font-weight:300;line-height:1.05;color:var(--cream);margin-bottom:1.5rem;opacity:0;animation:fadeUp 1s ease .2s forwards;}
.hero h1 em{font-style:italic;color:var(--rose);}
.hero-sub{font-size:clamp(.9rem,2vw,1.05rem);color:rgba(248,243,236,.55);max-width:480px;letter-spacing:.02em;opacity:0;animation:fadeUp 1s ease .4s forwards;margin:0 auto 3.5rem;text-align:center;}
.hero-line{width:60px;height:1px;background:var(--gold);margin:0 auto 2.5rem;opacity:0;animation:fadeUp 1s ease .5s forwards;}
.hero-nav{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;opacity:0;animation:fadeUp 1s ease .7s forwards;}
.hero-nav a{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(248,243,236,.6);text-decoration:none;padding:8px 18px;border:.5px solid rgba(248,243,236,.2);border-radius:100px;transition:all .25s;}
.hero-nav a:hover{color:var(--cream);border-color:var(--gold);background:rgba(184,151,90,.1);}
.scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fadeUp 1s ease 1s forwards;}
.scroll-hint span{font-size:10px;letter-spacing:.2em;color:rgba(248,243,236,.3);text-transform:uppercase;}
.scroll-dot{width:1px;height:40px;background:linear-gradient(to bottom,var(--gold),transparent);animation:scrollPulse 2s ease-in-out infinite;}

/* STICKY NAV */
.sticky-nav{position:sticky;top:0;z-index:100;background:rgba(248,243,236,.95);backdrop-filter:blur(10px);border-bottom:.5px solid var(--cream-dark);padding:.5rem 1rem;display:flex;flex-direction:column;gap:5px;}
.nav-utility{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.nav-intro-link{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);text-decoration:none;padding:5px 10px;border-radius:100px;transition:all .2s;white-space:nowrap;}
.nav-intro-link:hover{background:var(--cream-dark);color:var(--ink);}
.nav-right{display:flex;align-items:center;gap:6px;}
.nav-dates{display:flex;flex-direction:column;gap:3px;}
.nav-dates-row{display:flex;gap:2px;justify-content:center;}
.nav-dates-row a{font-size:10px;font-family:'Cormorant Garamond',serif;font-style:italic;letter-spacing:.05em;color:var(--ink-muted);text-decoration:none;padding:3px 7px;border-radius:100px;transition:all .2s;min-width:24px;text-align:center;}
.nav-dates-row a:hover{background:var(--cream-dark);color:var(--ink);}
.mydate-btn{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:5px 13px;border-radius:100px;cursor:pointer;border:.5px solid var(--cream-dark);background:none;color:var(--ink-muted);font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;}
.mydate-btn:hover{background:var(--cream-dark);color:var(--ink);}
.mydate-btn.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}
.lang-switch{display:flex;align-items:center;border:.5px solid var(--cream-dark);border-radius:100px;overflow:hidden;flex-shrink:0;}
.lang-btn{font-size:10px;font-weight:500;letter-spacing:.08em;padding:4px 9px;background:none;border:none;cursor:pointer;color:var(--ink-muted);transition:all .2s;font-family:'DM Sans',sans-serif;}
.lang-btn.active{background:var(--ink);color:var(--cream);}
.lang-btn:hover:not(.active){background:var(--cream-dark);color:var(--ink);}
@media(min-width:640px){
  .sticky-nav{flex-direction:row;align-items:center;justify-content:space-between;padding:.5rem 1.5rem;}
  .nav-utility{flex:0 0 auto;}
  .nav-dates{flex-direction:column;gap:2px;}
  .nav-dates-row{gap:2px;}
}

/* VIEW SWITCHING */
.view-guide .guide-only{display:block;}
.view-guide .form-only{display:none;}
.view-form .guide-only{display:none;}
.view-form .form-only{display:block;}

/* GUIDE */
.main{max-width:900px;margin:0 auto;padding:5rem 2rem;}
.section-eyebrow{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:.75rem;display:block;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3rem);font-weight:300;line-height:1.15;color:var(--ink);margin-bottom:1.25rem;}
.section-rule{width:40px;height:1.5px;background:var(--gold);margin-bottom:1.5rem;}
.section-lead{font-size:1rem;color:var(--ink-soft);line-height:1.75;max-width:640px;margin-bottom:3rem;}
.before-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1px;background:var(--cream-dark);border:1px solid var(--cream-dark);border-radius:16px;overflow:hidden;margin-bottom:3rem;}
.before-cell{background:var(--cream);padding:1.5rem;}
.before-cell-title{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;font-weight:500;}
.before-cell ul{list-style:none;display:flex;flex-direction:column;gap:8px;}
.before-cell li{font-size:13px;color:var(--ink-soft);line-height:1.55;padding-left:14px;position:relative;}
.before-cell li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%;background:var(--rose);}
.do-dont{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:3rem;}
@media(max-width:500px){.do-dont{grid-template-columns:1fr;}}
.do-box{padding:1.5rem;border-radius:12px;background:#EEF5EC;}
.dont-box{padding:1.5rem;border-radius:12px;background:var(--rose-pale);}
.do-box h4{color:#3A6B35;font-size:11px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:1rem;font-weight:500;}
.dont-box h4{color:var(--rose);font-size:11px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:1rem;font-weight:500;}
.do-box li,.dont-box li{font-size:13px;line-height:1.6;margin-bottom:7px;padding-left:16px;position:relative;list-style:none;}
.do-box li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%;background:#3A6B35;}
.dont-box li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%;background:var(--rose);}
.do-box li{color:#2A4A27;}.dont-box li{color:#6B3530;}
.date-section{margin-bottom:5rem;opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease;}
.date-section.visible{opacity:1;transform:translateY(0);}
.date-header{display:flex;align-items:flex-start;gap:1.5rem;margin-bottom:2rem;}
.date-num{font-family:'Cormorant Garamond',serif;font-size:4rem;font-weight:300;line-height:1;flex-shrink:0;margin-top:-.3rem;}
.date-heading h2{font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,3.5vw,2.3rem);font-weight:400;line-height:1.15;margin-bottom:4px;}
.date-heading p{font-size:13px;color:var(--ink-muted);letter-spacing:.05em;}
.date-focus{padding:1.25rem 1.5rem;border-radius:10px;font-size:13.5px;line-height:1.75;font-style:italic;margin-bottom:2rem;border-left:2px solid;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:1rem;}
@media(max-width:680px){.three-col{grid-template-columns:1fr;}}
.col-block{border-radius:10px;padding:1.25rem;}
.col-block h4{font-size:10px;letter-spacing:.25em;text-transform:uppercase;font-weight:500;margin-bottom:1rem;}
.col-block ul{list-style:none;display:flex;flex-direction:column;gap:9px;}
.col-block li{font-size:12.5px;line-height:1.6;color:var(--ink-soft);padding-left:14px;position:relative;}
.col-block li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%;}
.steps-col{background:var(--cream-dark);}.steps-col h4{color:var(--ink-muted);}.steps-col li::before{background:var(--ink-muted);}
.questions-col{background:var(--gold-light);}.questions-col h4{color:#7A5F30;}.questions-col li{color:#5A4020;font-style:italic;}.questions-col li::before{background:var(--gold);}
.breaks-col{background:var(--rose-pale);}.breaks-col h4{color:#8A4A44;}.breaks-col li{color:#6B3530;}.breaks-col li::before{background:var(--rose);}
.ritual-block{background:var(--ink);border-radius:12px;padding:1.5rem;margin-top:1rem;}
.ritual-eyebrow{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;font-weight:500;}
.ritual-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:400;color:var(--cream);margin-bottom:.75rem;}
.ritual-desc{font-size:12.5px;color:rgba(248,243,236,.55);line-height:1.7;font-style:italic;margin-bottom:1.25rem;}
.ritual-steps{display:flex;flex-direction:column;gap:8px;}
.ritual-step{display:flex;align-items:flex-start;gap:12px;font-size:12.5px;color:rgba(248,243,236,.8);line-height:1.6;}
.ritual-step-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0;margin-top:1px;}
.ritual-why{margin-top:1.25rem;padding-top:1.25rem;border-top:.5px solid rgba(248,243,236,.12);font-size:12px;color:rgba(248,243,236,.4);line-height:1.65;}
.ritual-why strong{color:rgba(248,243,236,.6);font-weight:500;}
.ornamental-divider{display:flex;align-items:center;gap:1rem;margin:4rem 0;}
.ornamental-divider::before,.ornamental-divider::after{content:'';flex:1;height:.5px;background:linear-gradient(to right,transparent,var(--cream-dark));}
.ornamental-divider::after{background:linear-gradient(to left,transparent,var(--cream-dark));}
.ornamental-divider span{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--ink-muted);font-style:italic;}
.footer{background:var(--ink);text-align:center;padding:4rem 2rem;}
.footer h3{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--cream);margin-bottom:.75rem;}
.footer p{font-size:13px;color:rgba(248,243,236,.4);margin-bottom:2rem;}
.footer-line{width:40px;height:1px;background:var(--gold);margin:0 auto 1.5rem;}
.footer-credit{font-size:11px;color:rgba(248,243,236,.25);letter-spacing:.1em;}

/* COLOR THEMES — ORIGINAL 8 */
.d1{--acc:#7F77DD;--apal:#EEEDFE;--atx:#3C3489;}.d2{--acc:#D85A30;--apal:#FAECE7;--atx:#712B13;}
.d3{--acc:#C4607E;--apal:#FBEAF0;--atx:#72243E;}.d4{--acc:#BA7517;--apal:#FAEEDA;--atx:#633806;}
.d5{--acc:#639922;--apal:#EAF3DE;--atx:#27500A;}.d6{--acc:#378ADD;--apal:#E6F1FB;--atx:#0C447C;}
.d7{--acc:#1D9E75;--apal:#E1F5EE;--atx:#085041;}.d8{--acc:#534AB7;--apal:#EEEDFE;--atx:#26215C;}
/* NEW 4 */
.d9{--acc:#8B5CF6;--apal:#EDE9FE;--atx:#4C1D95;}
.d10{--acc:#D97706;--apal:#FEF3C7;--atx:#78350F;}
.d11{--acc:#059669;--apal:#ECFDF5;--atx:#064E3B;}
.d12{--acc:#2563EB;--apal:#EFF6FF;--atx:#1E3A8A;}
.date-num{color:var(--acc);}.date-focus{background:var(--apal);border-color:var(--acc);color:var(--atx);}

/* FORM VIEW */
.form-view-wrap{max-width:820px;margin:0 auto;padding:2.5rem 2rem 6rem;}
.progress-wrap{background:rgba(28,21,16,.08);height:2px;}
.progress-bar{height:2px;background:var(--gold);width:0%;transition:width .4s ease;}
.save-indicator{font-size:11px;letter-spacing:.1em;color:var(--ink-muted);transition:color .4s;}
.save-indicator.saved{color:#2A7A5A;}
.btn-export{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border-radius:100px;cursor:pointer;background:var(--gold);color:var(--ink);border:none;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-export:hover{background:#a8823e;}
.btn-import{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border-radius:100px;cursor:pointer;background:none;color:var(--ink-muted);border:.5px solid var(--cream-dark);font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-import:hover{background:var(--cream-dark);color:var(--ink);}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--cream);font-size:12px;font-weight:500;letter-spacing:.08em;padding:10px 22px;border-radius:100px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:#8B2020;}
.couple-card{background:var(--ink);border-radius:16px;padding:2rem;margin-bottom:2.5rem;}
.couple-card h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;color:var(--cream);margin-bottom:.4rem;}
.couple-card p{font-size:13px;color:rgba(248,243,236,.4);margin-bottom:1.5rem;}
.couple-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:580px){.couple-fields{grid-template-columns:1fr 1fr;}}
@media(max-width:380px){.couple-fields{grid-template-columns:1fr;}}
.field-group label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(248,243,236,.4);display:block;margin-bottom:6px;font-weight:500;}
.field-group input{width:100%;background:rgba(248,243,236,.08);border:.5px solid rgba(248,243,236,.15);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--cream);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.field-group input:focus{border-color:rgba(184,151,90,.6);}
.field-group input::placeholder{color:rgba(248,243,236,.2);}
.date-block{margin-bottom:3rem;opacity:0;transform:translateY(20px);transition:opacity .6s,transform .6s;}
.date-block.visible{opacity:1;transform:translateY(0);}
.date-block-header{display:flex;align-items:flex-start;gap:1.25rem;padding:1.5rem;border-radius:14px 14px 0 0;border:1px solid var(--cream-dark);border-bottom:none;background:var(--cream-mid);}
.date-num-badge{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:300;line-height:1;flex-shrink:0;}
.date-block-meta{flex:1;}
.date-block-meta h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400;line-height:1.2;margin-bottom:2px;}
.date-block-meta p{font-size:12px;color:var(--ink-muted);letter-spacing:.04em;}
.date-done-row{display:flex;align-items:center;gap:12px;margin-top:10px;flex-wrap:wrap;}
.date-done-label{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;}
.date-done-input{background:var(--cream);border:.5px solid var(--cream-dark);border-radius:8px;padding:6px 10px;font-size:13px;color:var(--ink);font-family:'DM Sans',sans-serif;outline:none;}
.date-done-input:focus{border-color:var(--gold);}
.date-block-body{border:1px solid var(--cream-dark);border-top:none;border-radius:0 0 14px 14px;background:white;overflow:hidden;}
.question-row{padding:1.25rem 1.5rem;border-bottom:.5px solid var(--cream-dark);}
.question-row:last-child{border-bottom:none;}
.q-label{font-size:12.5px;font-style:italic;color:var(--ink-soft);line-height:1.6;margin-bottom:.75rem;padding-left:12px;border-left:2px solid var(--gold);}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:540px){.answers-grid{grid-template-columns:1fr;}}
.answer-group label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-muted);display:block;margin-bottom:5px;font-weight:500;}
textarea{width:100%;min-height:72px;resize:vertical;background:var(--cream);border:.5px solid var(--cream-dark);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--ink);line-height:1.6;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
textarea:focus{border-color:var(--gold);background:#fff;}
textarea::placeholder{color:var(--ink-muted);opacity:.5;}
.notes-row{padding:1.25rem 1.5rem;background:var(--gold-light);border-top:.5px solid var(--cream-dark);}
.notes-row label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#7A5F30;display:block;margin-bottom:6px;font-weight:500;}
.notes-row textarea{background:#fff;border-color:rgba(184,151,90,.3);min-height:60px;}
.rating-row{padding:1rem 1.5rem;background:var(--cream-mid);border-top:.5px solid var(--cream-dark);display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.rating-label{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;white-space:nowrap;}
.stars{display:flex;gap:4px;}
.star{width:28px;height:28px;border-radius:50%;border:.5px solid var(--cream-dark);background:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--ink-muted);}
.star:hover,.star.active{background:var(--gold);border-color:var(--gold);color:var(--ink);}
.mood-row{padding:1rem 1.5rem;background:var(--rose-pale);border-top:.5px solid var(--cream-dark);display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
.mood-chip{font-size:12px;padding:5px 13px;border-radius:100px;border:.5px solid rgba(196,117,106,.3);background:none;cursor:pointer;color:var(--rose);font-family:'DM Sans',sans-serif;transition:all .15s;}
.mood-chip.active{background:var(--rose);color:white;border-color:var(--rose);}
.completion-banner{background:var(--ink);border-radius:16px;padding:2rem;text-align:center;margin-top:2.5rem;display:none;}
.completion-banner.show{display:block;}
.completion-banner h3{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:var(--cream);margin-bottom:.5rem;}
.completion-banner p{font-size:13px;color:rgba(248,243,236,.45);margin-bottom:1.5rem;}
.btn-full-export{display:inline-block;background:var(--gold);color:var(--ink);font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:10px 24px;border-radius:100px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-full-export:hover{background:#a8823e;}
/* form badge colors */
.fb1 .q-label{border-color:#7F77DD;}.fb1 .date-num-badge{color:#7F77DD;}
.fb2 .q-label{border-color:#D85A30;}.fb2 .date-num-badge{color:#D85A30;}
.fb3 .q-label{border-color:#C4607E;}.fb3 .date-num-badge{color:#C4607E;}
.fb4 .q-label{border-color:#BA7517;}.fb4 .date-num-badge{color:#BA7517;}
.fb5 .q-label{border-color:#639922;}.fb5 .date-num-badge{color:#639922;}
.fb6 .q-label{border-color:#378ADD;}.fb6 .date-num-badge{color:#378ADD;}
.fb7 .q-label{border-color:#1D9E75;}.fb7 .date-num-badge{color:#1D9E75;}
.fb8 .q-label{border-color:#534AB7;}.fb8 .date-num-badge{color:#534AB7;}
.fb9 .q-label{border-color:#8B5CF6;}.fb9 .date-num-badge{color:#8B5CF6;}
.fb10 .q-label{border-color:#D97706;}.fb10 .date-num-badge{color:#D97706;}
.fb11 .q-label{border-color:#059669;}.fb11 .date-num-badge{color:#059669;}
.fb12 .q-label{border-color:#2563EB;}.fb12 .date-num-badge{color:#2563EB;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes scrollPulse{0%,100%{opacity:.3;}50%{opacity:1;}}
@media(max-width:600px){
  .form-view-wrap{padding:1.5rem 1rem 5rem;}
  .date-block-header{padding:1.1rem;}
  .question-row{padding:1rem 1.1rem;}
}
</style>
</head>
<body class="view-guide">

<!-- HERO -->
<section class="hero guide-only">

  d4_q1:"Was money a source of stress, safety, or something else growing up?",
  d4_q2:"Do you feel financially secure in our relationship right now?",
  d4_q3:"What does financial freedom look like to you?",
  d4_q4:"Is there a financial decision I've made that worried or frustrated you?",
  d4_q5:"Do you feel supported in your career goals — or held back?",
  d4_b1:"Stop if the conversation becomes about fault for past financial mistakes",
  d4_b2:"Don't use this date to negotiate a budget — that's practical, not emotional",
  d4_b3:"Step back if resentment about income inequality is triggered — it needs its own space",
  d4_r_eyebrow:"Opening ritual · 8 min",
  d4_r_name:"The money memory",
  d4_r_desc:"Money conversations hurt when they're about numbers. This ritual grounds you in the emotional history each person brings to the topic.",
  d4_rs1:"Each take two minutes in silence to recall your earliest memory involving money.",
  d4_rs2:"Share the memory in full. The listener only listens — no commentary yet.",
  d4_rs3:"After both share, each answer: \"What feeling does that memory leave you with?\"",
  d4_rs4:"Acknowledge what you heard: \"It makes sense that you think about money the way you do.\"",
  d4_rs5:"Only then begin the date.",
  d4_r_why:"Your financial personality was shaped long before you met your partner. Understanding its roots prevents you from taking each other's reactions personally.",
  d5_title:"Family",
  d5_sub:"Roots, roles, and the families we came from",
  d5_focus:"You didn't just marry a person — you married their entire family history. Explore how each of your upbringings shape your expectations of partnership and parenting.",
  d5_s1:"Describe your family growing up — what was the emotional climate?",
  d5_s2:"Identify which patterns you want to carry forward and which to leave behind",
  d5_s3:"Discuss roles: who did what, and what do you expect now?",
  d5_s4:"If you have or want children, explore parenting philosophies and fears",
  d5_s5:"Ask what your parents got right — and what you wish had been different",
  d5_q1:"What's one thing from your upbringing you want us to carry forward?",
  d5_q2:"What pattern from your family are you afraid of repeating?",
  d5_q3:"How was love expressed in your home — words, acts, time?",
  d5_q4:"What did conflict look like in your household — resolved or buried?",
  d5_q5:"What kind of family culture do you want us to create together?",
  d5_b1:"Stop if the conversation indicts each other's families — they aren't the enemy",
  d5_b2:"Pause if childhood trauma surfaces unexpectedly — it deserves a supported space",
  d5_b3:"Don't let in-law tensions dominate — focus on values and patterns, not specific people",
  d5_r_eyebrow:"Opening ritual · 7–8 min",
  d5_r_name:"Show me one thing",
  d5_r_desc:"Family is abstract until it's specific. Bring your origins into the room concretely before you discuss them.",
  d5_rs1:"Before the date, each find one photo or small object connected to your family or childhood.",
  d5_rs2:"Share it with your partner. Tell the story behind it in two or three minutes.",
  d5_rs3:"The listener asks just one follow-up: \"What do you love most about that memory?\"",
  d5_rs4:"Put the objects somewhere visible for the rest of the date.",
  d5_rs5:"Begin, knowing you've each brought your family into the room with you.",
  d5_r_why:"Objects bypass defensiveness. They make family feel present and real — not a concept to debate, but a life to understand.",
  d6_title:"Play & Adventure",
  d6_sub:"Fun, spontaneity, and shared joy",
  d6_focus:"Couples who play together stay together. Explore what lights you both up and how well you know each other's idea of fun.",
  d6_s1:"Share your happiest childhood memory of play or adventure",
  d6_s2:"Describe your dream adventure together — big or small",
  d6_s3:"Identify activities that energise you vs. ones you do out of obligation",
  d6_s4:"Find at least one new thing you'd both like to try",
  d6_s5:"Talk about what \"fun\" looked like early in your relationship",
  d6_q1:"What playful thing we used to do have we stopped — and do you miss it?",
  d6_q2:"What would your ideal spontaneous day with me look like?",
  d6_q3:"Is there something you secretly want to try but haven't mentioned?",
  d6_q4:"Do we laugh enough together? What makes you laugh with me?",
  d6_q5:"What does adventure mean to you — travel, novelty, risk, or something else?",
  d6_b1:"Stop if it becomes a catalogue of what's missing or boring in your relationship",
  d6_b2:"Don't dismiss your partner's idea of fun as childish — all play is valid",
  d6_b3:"Step back if comparison to other couples creeps in — it leads nowhere useful",
  d6_r_eyebrow:"Opening ritual · 3 min",
  d6_r_name:"The 60-second silly",
  d6_r_desc:"You cannot talk about play while being serious. This cracks open lightness before the date begins.",
  d6_rs1:"Set a 60-second timer.",
  d6_rs2:"Both must make each other laugh before it runs out — using only face, voice, or body. No tickling. No props.",
  d6_rs3:"If the first person fails, the other tries.",
  d6_rs4:"Sit down still smiling.",
  d6_rs5:"Begin by sharing: \"The funniest thing we ever did together was…\"",
  d6_r_why:"Laughter is physiologically incompatible with anxiety. Starting from joy makes it far easier to talk honestly about fun.",
  d7_title:"Growth & Spirituality",
  d7_sub:"Meaning, purpose, and personal evolution",
  d7_focus:"The deepest questions — what do you believe, what gives your life meaning, and how do you grow together? There are no right answers, only honest ones.",
  d7_s1:"Share what gives your life a sense of meaning and purpose",
  d7_s2:"Discuss your beliefs — spiritual, philosophical, or secular",
  d7_s3:"Ask: \"How have you changed in the last five years? What changed you?\"",
  d7_s4:"Explore what personal growth looks like and how you support each other in it",
  d7_s5:"Discuss rituals or practices that feel meaningful to you as a couple",
  d7_q1:"What do you believe happens after we die — and does it bring you comfort?",
  d7_q2:"What gives your life the most meaning right now?",
  d7_q3:"Do you feel I support who you're becoming, or who you used to be?",
  d7_q4:"Is there a part of yourself you feel you've lost in our relationship? Or gained?",
  d7_q5:"What would you regret not doing if you knew your time was limited?",
  d7_b1:"Stop if it turns into a debate about whose beliefs are correct — it's about understanding",
  d7_b2:"Pause if existential fears become overwhelming — that's deep work, not a dinner topic",
  d7_b3:"Step back if one partner feels pressured to adopt the other's worldview",
  d7_r_eyebrow:"Opening ritual · 8–10 min",
  d7_r_name:"The silence sit",
  d7_r_desc:"This date asks the biggest questions. It deserves the most intentional opening. Shared silence is not awkward — it is the beginning of the conversation.",
  d7_rs1:"Sit together somewhere quiet. Turn off all sound.",
  d7_rs2:"Set a timer for five minutes. Sit in complete silence side by side or facing each other.",
  d7_rs3:"No phones. No fidgeting. Just sit.",
  d7_rs4:"When the timer ends, each share the first word that came to mind during the silence.",
  d7_rs5:"Use those two words as the opening question: \"Why did that word come to you?\"",
  d7_r_why:"Silence creates interiority. Meaning and purpose live beneath the noise — five minutes of shared quiet is often more connecting than five minutes of conversation.",
  d8_title:"Dreams & Visions",
  d8_sub:"The future you're building together",
  d8_focus:"The capstone date. Build a shared map of the future — not a rigid plan, but a living vision that honours both people's dreams.",
  d8_s1:"Each share your deepest personal dream — something never fully voiced",
  d8_s2:"Describe your ideal life together in ten years",
  d8_s3:"Look for overlap and divergence — where do dreams align and pull apart?",
  d8_s4:"Discuss what legacy you want to leave as a couple and as individuals",
  d8_s5:"Create a shared vision statement: \"We are building a life that…\"",
  d8_q1:"What's a dream you've had since childhood you've never told me about?",
  d8_q2:"If money and fear were removed, what would you do with your life?",
  d8_q3:"What does success look like to you — and does our life reflect that?",
  d8_q4:"What do you want people to say about us as a couple when we're gone?",
  d8_q5:"Is there a dream you're afraid to share because you think I won't support it?",
  d8_b1:"Stop if dreams are met with \"that's not realistic\" — it kills vulnerability instantly",
  d8_b2:"Don't treat diverging dreams as incompatibility — different visions can coexist",
  d8_b3:"Step back if anxiety about the future overrides possibility — return to what's already good",
  d8_r_eyebrow:"Opening ritual · 10 min",
  d8_r_name:"The future letter",
  d8_r_desc:"This is the last of the original eight dates. The ritual opens you to a future orientation — from who you've been to who you are becoming.",
  d8_rs1:"Each take a piece of paper and write a letter to yourself, ten years from now. Five to eight sentences. What do you hope is true?",
  d8_rs2:"Take five minutes. Write in silence.",
  d8_rs3:"Read your letters aloud to each other. No interruption.",
  d8_rs4:"Each respond with: \"The part that moved me most was…\"",
  d8_rs5:"Fold the letters and keep them. Begin the date knowing you've spoken your future into the room.",
  d8_r_why:"Writing activates future-self thinking, which creates hope and intentionality — exactly the mindset needed to build a shared vision rather than manage current problems.",
  d9_title:"Mental Health & Wellbeing",
  d9_sub:"The conversation most couples only have after crisis",
  d9_focus:"Explore your emotional landscapes — the conditions, patterns, and needs that shape how you each function. This isn't therapy; it's the prerequisite for being each other's ally rather than each other's mystery.",
  d9_s1:"Share your personal history with anxiety, depression, or emotional struggles",
  d9_s2:"Describe your early warning signs — what does 'not okay' look like for you?",
  d9_s3:"Tell your partner what you need when struggling — and what makes it worse",
  d9_s4:"Discuss your relationship with therapy — individual and as a couple",
  d9_s5:"Make a quiet plan together: what should I do if I notice you're not okay?",
  d9_q1:"What are your early warning signs that you're struggling emotionally?",
  d9_q2:"What do you need from me when you're not doing well — space, presence, or something else?",
  d9_q3:"Is there a mental health struggle from your past that still shapes how you behave today?",
  d9_q4:"Have I ever made things harder for you without realising it during a difficult period?",
  d9_q5:"What's the most helpful thing I've done for your emotional wellbeing without knowing it?",
  d9_b1:"Stop if you begin diagnosing or explaining their mental state back to them",
  d9_b2:"Pause if a current crisis surfaces — this needs real support, not a date format",
  d9_b3:"Step back if mental health is used to explain hurtful behaviour rather than understand it",
  d9_r_eyebrow:"Opening ritual · 5 min",
  d9_r_name:"The weather report",
  d9_r_desc:"Before talking about your inner landscape, map it with a simple metaphor. This removes the pressure of finding the right words for complex emotional states.",
  d9_rs1:"Each take 2 minutes alone to silently complete: \"My emotional weather this week has been...\"",
  d9_rs2:"Share your weather report — sunny, foggy, stormy, changeable, calm. No explanation required yet.",
  d9_rs3:"The listener responds: \"Tell me more about the [word they used].\"",
  d9_rs4:"Share for just 2 minutes each. Don't solve. Don't fix.",
  d9_rs5:"End with: \"I'm glad I know this about you.\"",
  d9_r_why:"Metaphor creates distance from shame. Weather isn't anyone's fault — it just is. This makes it safer to speak about mental states before the harder conversation has begun.",
  d10_title:"Identity & Personal Freedom",
  d10_sub:"Who are you outside this relationship?",
  d10_focus:"Healthy relationships require each person to remain a distinct individual. This date is about the parts of yourself that exist — or once existed — independent of being someone's partner. Knowing who your partner truly is requires knowing who they are alone.",
  d10_s1:"Share who you were before this relationship — what defined you?",
  d10_s2:"Name interests, ambitions, or habits you've quietly set aside since being together",
  d10_s3:"Discuss how much alone time you genuinely need and what it restores in you",
  d10_s4:"Explore the parts of yourself you feel you can't fully express in this relationship",
  d10_s5:"Ask each other: who are you becoming — and are we growing in compatible directions?",
  d10_q1:"Is there a version of yourself you feel you've lost or suppressed since we got together?",
  d10_q2:"What do you do — or who do you become — when you have time completely to yourself?",
  d10_q3:"What do you need from me to feel free to be fully yourself?",
  d10_q4:"Have you quietly given up an ambition or interest for this relationship?",
  d10_q5:"Are we growing in directions that feel compatible to you?",
  d10_b1:"Stop if the conversation becomes a list of what the relationship has cost you — that's a harder, different conversation",
  d10_b2:"Pause if identity loss feels very deep — it may need individual therapy, not a date",
  d10_b3:"Step back if comparison to a previous relationship or ex-partner surfaces as a reference point",
  d10_r_eyebrow:"Opening ritual · 5 min",
  d10_r_name:"Three words",
  d10_r_desc:"Before the date, each person quietly chooses three words that describe who they are outside this relationship. Not a role — just self.",
  d10_rs1:"Take 3 minutes in silence. Each write down three words for who you are independent of this relationship.",
  d10_rs2:"Share your three words one at a time. No explanation yet.",
  d10_rs3:"The listener picks the most surprising word: \"Tell me about [that word].\"",
  d10_rs4:"Each person speaks for 2 minutes about that word.",
  d10_rs5:"End by saying: \"I want you to always be that person.\"",
  d10_r_why:"Beginning with three words removes the blank-page anxiety of self-description. It tends to surface things neither person expected — and creates a felt sense of being truly seen.",
  d11_title:"Aging, Health & the Body",
  d11_sub:"Physical vulnerability and growing older together",
  d11_focus:"The conversation about bodies, health, and aging is one most couples defer until circumstances force it. Having it early — from curiosity rather than fear — changes how both people navigate illness, change, and the passage of time together.",
  d11_s1:"Share your family health history and what it might mean for your future",
  d11_s2:"Talk honestly about your relationship with your body — not just appearance, but vitality",
  d11_s3:"Discuss caregiving: what would you need from me if you were seriously ill?",
  d11_s4:"Explore end-of-life wishes — the conversation that protects both of you",
  d11_s5:"Talk about aging parents: what responsibility each of you feels, and how that affects us",
  d11_q1:"Is there a health concern you carry quietly that I don't fully know about?",
  d11_q2:"What would you need from me if you became seriously ill?",
  d11_q3:"How do you feel about your body right now — are you at peace with it?",
  d11_q4:"How do you feel about getting older — does it frighten you, or feel okay?",
  d11_q5:"Have you thought about what you'd want at the end of your life?",
  d11_b1:"Stop if end-of-life discussion triggers acute anxiety — take it in smaller pieces another time",
  d11_b2:"Pause if body image vulnerabilities are met with dismissal rather than curiosity",
  d11_b3:"Step back if caregiving becomes transactional — \"would you stay if I got sick?\" is a test, not a conversation",
  d11_r_eyebrow:"Opening ritual · 8 min",
  d11_r_name:"The letter to your body",
  d11_r_desc:"Before discussing health and aging, each person takes time to quietly acknowledge the body they're in — with gratitude rather than judgment.",
  d11_rs1:"Take 3 minutes alone to silently complete: \"Dear body, thank you for...\"",
  d11_rs2:"You don't need to write it — just think it. But write if it helps.",
  d11_rs3:"Share what came up. Not the whole letter — just one thing you felt grateful for.",
  d11_rs4:"The listener responds only: \"I'm glad you told me that.\"",
  d11_rs5:"Begin the date from that place of acceptance.",
  d11_r_why:"Most conversations about health start from fear or deficit. Beginning with gratitude reorients both people toward care rather than anxiety — a fundamentally different emotional starting point.",
  d12_title:"Political & Social Values",
  d12_sub:"What you believe about the world",
  d12_focus:"Political and social values are deeply personal — shaped by childhood, experience, and what you've witnessed. Many couples assume alignment without ever verifying it. This date is about understanding each other's worldview, not agreeing on it.",
  d12_s1:"Share how your political and social values were formed — what experiences shaped them?",
  d12_s2:"Name the social issue you care most deeply about — and why it feels personal",
  d12_s3:"Explore where your values genuinely diverge — and whether that feels manageable",
  d12_s4:"Discuss what you'd want to teach children about fairness, community, and power",
  d12_s5:"Find one value you share completely and name it aloud together",
  d12_q1:"What political or social issue is closest to your heart — and what made it personal?",
  d12_q2:"Is there a value of mine that you fundamentally don't share?",
  d12_q3:"How do you feel when we disagree about something political — threatened, curious, or indifferent?",
  d12_q4:"Is there a community or cause you wish I cared about more?",
  d12_q5:"Is there something I believe that quietly worries you?",
  d12_b1:"Stop if the conversation becomes a debate with a right and wrong answer",
  d12_b2:"Step back if either person begins editing themselves to avoid conflict — silence is not agreement",
  d12_b3:"Pause if the conversation conflates political views with personal character or intelligence",
  d12_r_eyebrow:"Opening ritual · 5 min",
  d12_r_name:"The headline",
  d12_r_desc:"Before discussing your values, each person shares one news story from the past week that made them feel something. Not to debate — just to share the feeling.",
  d12_rs1:"Each think of one news story or event from the past week that made you feel something strongly.",
  d12_rs2:"Share it in one sentence — just the headline.",
  d12_rs3:"Then say: \"It made me feel [emotion] because...\"",
  d12_rs4:"The listener responds only to the feeling: \"I understand why that would feel that way.\"",
  d12_rs5:"Switch. Then begin the date.",
  d12_r_why:"Entering a values conversation through emotion rather than position removes the defensive structure of debate. You're not arguing for a policy — you're sharing what it's like to be you in the world.",
  footer_credit:"A guide to twelve essential conversations for a lasting relationship",
  footer_sub:"A guide to the conversations that keep love alive",

    {num:"08",title:"Dreams & Visions",sub:"The future you're building together",qs:["What's a dream you've had since childhood you've never told me about?","If money and fear were removed, what would you do with your life?","What does success look like to you — and does our life reflect that?","What do you want people to say about us as a couple when we're gone?","Is there a dream you're afraid to share because you think I won't support it?"]},

    {num:"12",title:"Political & Social Values",sub:"What you believe about the world",qs:["What political or social issue is closest to your heart — and what made it personal?","Is there a value of mine that you fundamentally don't share?","How do you feel when we disagree about something political?","Is there a cause or community you wish I cared about more?","Is there something I believe that quietly worries you?"]}

  d1_title:"Dôvera a záväzok",
  d1_sub:"Základ všetkého ostatného",
  d1_focus:"Preskúmajte, čo dôvera a záväzok znamenajú pre každého z vás — nielen vernosť, ale aj emocionálnu dostupnosť. Pýtajte sa: „V čom som tu bol/a pre teba? V čom som naopak zlyhal/a?“",
  d1_s1:"Podeľte sa o moment, kedy ste sa so svojím partnerom cítili skutočne v bezpečí",
  d1_s2:"Definujte záväzok nad rámec vernosti — prítomnosť, úprimnosť, konzistentnosť",
  d1_s3:"Hovorte o skrytých obavách: „Čo by mohlo zničiť náš vzťah?“",
  d1_s4:"Dajte si spoločný sľub, ako budete riešiť budúce narušenia dôvery",
  d1_s5:"Uznajte minulé momenty, kedy bola vaša dôvera vystavená skúške",
  d1_q1:"Kedy sa v našom vzťahu cítiš najbezpečnejšie — a kedy naopak najneistejšie?",
  d1_q2:"Urobil/a som niečo, čo poškodilo tvoju dôveru, hoci aj nepatrne?",
  d1_q3:"Čo pre teba znamená lojalita nad rámec samotnej vernosti?",
  d1_q4:"Čo by si odo mňa potreboval/a, aby si sa cítil/a úplne bezpečne?",
  d1_q5:"Keby sa náš vzťah niekedy skončil, čo by si povedal/a, že sa rozpadlo ako prvé?",
  d1_b1:"Zastavte sa, ak sa rozhovor zmení na obviňovanie — dôvera sa tu má budovať, nie súdiť",
  d1_b2:"Dajte si pauzu, ak niektorý z vás začne byť defenzívny — urobte si 20-minútovú prestávku",
  d1_b3:"Nesnažte sa dnes večer nasilu všetko vyriešiť — stačí, že ste problém pomenovali",
  d1_r_eyebrow:"Úvodný rituál · 5 min",
  d1_r_name:"Výmena vďačnosti",
  d1_r_desc:"Dôvera rastie v malých okamihoch uznania. Tento rituál vás ukotví v tom, čo už medzi vami funguje, predtým, než začnete skúmať to, čo si vyžaduje pozornosť.",
  d1_rs1:"Sadnite si tvárou k sebe. Spoločne sa pomaly a zhlboka nadýchnite.",
  d1_rs2:"Každý nech zdieľa jednu konkrétnu vec, ktorú ten druhý nedávno urobil a vďaka ktorej ste sa cítili bezpečne — buďte presní.",
  d1_rs3:"Počúvajúci odpovie len: „Ďakujem, že si to všímaš.“ Nič viac.",
  d1_rs4:"Vymeňte si roly. Zopakujte.",
  d1_rs5:"Zakončite spoločne: „Som tu a nikam neodchádzam.“",
  d1_r_why:"Pomenovanie konkrétnych prejavov starostlivosti aktivuje v mozgu pocit bezpečia — ideálny stav pre rozhovor o dôvere.",
  d2_title:"Konflikt",
  d2_sub:"Ako sa hádať múdrejšie, nie tvrdšie",
  d2_focus:"Pochopte svoje vzorce pri konfliktoch — nie preto, aby ste vyriešili každý spor, ale aby ste zistili, ako každý z vás zvláda napätie. Cieľom je zvedavosť, nie výhra.",
  d2_s1:"Identifikujte svoj štýl pri konflikte: eskalácia, stiahnutie sa alebo odvádzanie pozornosti?",
  d2_s2:"Zdieľajte opakujúcu sa hádku — opíšte svoje pocity, nehľadajte vinu toho druhého",
  d2_s3:"Nájdite skrytý sen či túžbu pod opakujúcimi sa hádkami",
  d2_s4:"Dohodnite sa na signáli, ktorý použijete, keď situácia začne eskalovať",
  d2_s5:"Porozprávajte sa o tom, ako pre vás oboch vyzerá férová hádka",
  d2_q1:"Čo robím pri našich hádkach, čo ti najviac ubližuje?",
  d2_q2:"O čo ma v skutočnosti žiadaš, keď sa hádame o tejto téme?",
  d2_q3:"Ako sa riešili konflikty v tvojej rodine, keď si vyrastal/a?",
  d2_q4:"Čo by ti pomohlo, aby si sa počas nezhody cítil/a vypočutý/á?",
  d2_q5:"Máme za sebou nejakú hádku, ktorá ťa stále trápi, lebo zostala nevyriešená?",
  d2_b1:"Zastavte sa, ak sa cítite zahltení — búšiace srdce, prázdna myseľ. V takom stave nedokážete počúvať",
  d2_b2:"Nevracajte sa k samotnému obsahu hádky — dnešný večer je o vzorcoch, nie o konkrétnom incidente",
  d2_b3:"Ustúpte, ak niekto začne vymenúvať sťažnosti — toto nie je priestor na výčitky",
  d2_r_eyebrow:"Úvodný rituál · 5 min",
  d2_r_name:"Kontrola teploty",
  d2_r_desc:"Predtým, než začnete hovoriť o konfliktoch, zistite, ako na tom obaja momentálne ste. Toto cvičenie normalizuje úprimnosť o vašom počiatočnom rozpoložení.",
  d2_rs1:"Každý nech ohodnotí, ako sa práve teraz cíti na stupnici od 1 (pokoj) po 10 (už teraz napätie).",
  d2_rs2:"Najprv povedzte svoje číslo — zatiaľ bez vysvetlenia. Len číslo.",
  d2_rs3:"Každý povie jednu vetu o tom, čo za tým je — stres, únava, nervozita, čokoľvek.",
  d2_rs4:"Ak je niekto z vás nad 7, počkajte 15 minút a najprv urobte niečo na upokojenie.",
  d2_rs5:"Ak ste obaja pod 7, povedzte si spoločne: „Dnes večer sme zvedaví, nechceme bojovať.“",
  d2_r_why:"Úvodná kontrola pocitov zabráni tomu, aby ste si do rozhovoru priniesli skryté napätie a omylom si ho vysvetlili ako vzájomný konflikt.",
  d3_title:"Sex a intimita",
  d3_sub:"Túžba, blízkosť a zraniteľnosť",
  d3_focus:"Rozprávajte sa o tom, čo pre vás znamená intimita nad rámec fyzického kontaktu — bezpečie, túžba a emocionálna blízkosť sú jej pevnou súčasťou. Pristupujte k téme s láskavosťou a bez tlaku na výkon.",
  d3_s1:"Zdieľajte, kedy sa cítite najviac žiadaný/á a emocionálne prepojený/á",
  d3_s2:"Porozprávajte sa o tom, aký je pre každého z vás rozdiel medzi sexom a intimitou",
  d3_s3:"Diskutujte o tom, ako stres a životné zmeny ovplyvňujú vašu túžbu",
  d3_s4:"Opýtajte sa, čo by ste mohli robiť viac — a čo by ste chceli zmeniť",
  d3_s5:"Preskúmajte, čo pre každého z vás znamená novosť a spontánnosť",
  d3_q1:"Kedy máš pocit, že sme si najbližší — pri fyzickej intimite, alebo v iných momentoch?",
  d3_q2:"Je niečo o našom sexuálnom živote, čo si mi chcel/a povedať, ale doteraz si to neurobil/a?",
  d3_q3:"Ako vnímaš to, ako často sme teraz intímni?",
  d3_q4:"Keď prevezmem iniciatívu ja, cítiš sa žiadaný/á, alebo pod tlakom?",
  d3_q5:"Čo by ti pomohlo cítiť sa emocionálne prepojenejšie ešte pred fyzickým zblížením?",
  d3_b1:"Zastavte sa, ak sa rozhovor zmení na kritiku sexuálneho výkonu — to ľudí len uzavrie do seba",
  d3_b2:"Neporovnávajte súčasnosť so začiatkami vášho randenia — prirodzený vývoj vzťahu to zbytočne patologizuje",
  d3_b3:"Ustúpte, ak do rozhovoru vstúpi pocit hanby — nikto by sa nemal cítiť odsudzovaný za svoje potreby",
  d3_r_eyebrow:"Úvodný rituál · 3–4 min",
  d3_r_name:"Dvojminútové objatie",
  d3_r_desc:"Fyzická blízkosť predtým, než začnete hovoriť o intimite, nie je rozpor — to je presne podstata. Presuňte sa z hláv do tiel predtým, než použijete slová.",
  d3_rs1:"Postavte sa a objímte sa — skutočné objatie bez zhonu. Nie ako pozdrav, ale objatie, v ktorom zotrváte.",
  d3_rs2:"Držte sa aspoň dve minúty. Bez slov.",
  d3_rs3:"Všímajte si: vaše dýchanie, teplo, akékoľvek napätie vo vlastnom tele.",
  d3_rs4:"Keď sa oddialite, každý nech povie len jedno slovo, ktoré vystihuje, ako sa práve cíti.",
  d3_rs5:"Sadnite si. Začnite rande z tohto bodu.",
  d3_r_why:"Dlhé objatie uvoľňuje oxytocín, znižuje kortizol a vytvára pocit prepojenia ešte predtým, než sa začne zraniteľnosť tohto rozhovoru.",
  d4_title:"Práca a peniaze",
  d4_sub:"Hodnoty, bezpečie a spoločná budúcnosť",
  d4_focus:"Peniaze sú zriedkavo len o peniazoch — sú o bezpečí, slobode, kontrole a hodnotách. Snažte sa pochopiť finančnú osobnosť svojho partnera, nielen to, ako utráca.",
  d4_s1:"Podeľte sa o svoju najrannejšiu spomienku spojenú s peniazmi a ako sformovala vaše presvedčenia",
  d4_s2:"Identifikujte svoje finančné hodnoty: bezpečie, sloboda, štedrosť, status?",
  d4_s3:"Porozprávajte sa o tom, čo pre každého z vás znamená „dostatok“",
  d4_s4:"Hovorte o práci — cítite sa vo svojej kariére videní a podporovaní?",
  d4_s5:"Vytvorte si spoločnú víziu finančného zabezpečenia o 5 až 10 rokov",
  d4_q1:"Boli peniaze počas tvojho dospievania zdrojom stresu, bezpečia, alebo niečoho iného?",
  d4_q2:"Cítiš sa momentálne v našom vzťahu finančne bezpečne?",
  d4_q3:"Ako pre teba vyzerá finančná sloboda?",
  d4_q4:"Urobil/a som nejaké finančné rozhodnutie, ktoré ťa znepokojilo alebo frustrovalo?",
  d4_q5:"Cítiš podporu vo svojich kariérnych cieľoch — alebo ťa niečo brzdí?",
  d4_b1:"Zastavte sa, ak sa rozhovor zvrhne na hľadanie vinníka za minulé finančné chyby",
  d4_b2:"Nepoužívajte toto rande na vyjednávanie o rozpočte — to je praktická záležitosť, nie emocionálna",
  d4_b3:"Ustúpte, ak sa vynorí zášť pre príjmovú nerovnosť — táto téma si vyžaduje vlastný priestor",
  d4_r_eyebrow:"Úvodný rituál · 8 min",
  d4_r_name:"Spomienka na peniaze",
  d4_r_desc:"Rozhovory o peniazoch bolia, keď sú len o číslach. Tento rituál vás ukotví v emocionálnej histórii, ktorú si každý z vás do tejto témy prináša.",
  d4_rs1:"Vezmite si dve minúty v tichu na to, aby ste si vybavili svoju najrannejšiu spomienku spojenú s peniazmi.",
  d4_rs2:"Podeľte sa o celú túto spomienku. Počúvajúci len počúva — zatiaľ bez komentárov.",
  d4_rs3:"Keď obaja dohovoríte, každý odpovie na otázku: „Aký pocit v tebe táto spomienka zanecháva?“",
  d4_rs4:"Uznajte, čo ste počuli: „Dáva zmysel, že o peniazoch premýšľaš tak, ako premýšľaš.“",
  d4_rs5:"Až potom začnite samotné rande.",
  d4_r_why:"Vaša finančná osobnosť sa formovala dávno predtým, než ste stretli svojho partnera. Pochopenie jej koreňov vám pomôže nebrať si vzájomné reakcie príliš osobne.",
  d5_title:"Rodina",
  d5_sub:"Korene, roly a rodiny, z ktorých pochádzame",
  d5_focus:"Nespojili ste svoj život len s jedným človekom — vstúpili ste aj do celej jeho rodinnej histórie. Preskúmajte, ako vaša výchova formuje vaše očakávania od partnerstva a rodičovstva.",
  d5_s1:"Opíšte rodinu, v ktorej ste vyrastali — aká v nej vládla emocionálna atmosféra?",
  d5_s2:"Pomenujte, ktoré vzorce si chcete ponechať a ktoré radšej zanechať v minulosti",
  d5_s3:"Diskutujte o rolách: kto čo robil a aké sú vaše očakávania teraz?",
  d5_s4:"Ak máte alebo chcete mať deti, preskúmajte svoje pohľady na výchovu a obavy",
  d5_s5:"Pýtajte sa, čo vaši rodičia urobili dobre — a čo by ste chceli, aby bolo inak",
  d5_q1:"Čo z tvojej výchovy by si chcel/a, aby sme preniesli do nášho vzťahu/rodiny?",
  d5_q2:"Akého vzorca z tvojej rodiny sa bojíš, že ho zopakuješ?",
  d5_q3:"Ako sa u vás doma prejavovala láska — slovami, činmi, časom?",
  d5_q4:"Ako u vás doma vyzerali konflikty — riešili sa, alebo zametali pod koberec?",
  d5_q5:"Akú rodinnú kultúru by si chcel/a, aby sme si spoločne vytvorili?",
  d5_b1:"Zastavte sa, ak sa rozhovor zmení na obviňovanie rodiny toho druhého — nie sú to nepriatelia",
  d5_b2:"Dajte si pauzu, ak sa nečakane vynorí trauma z detstva — tá si vyžaduje bezpečný a podporujúci priestor",
  d5_b3:"Nedovoľte, aby rozhovor ovládlo napätie so svokrovcami — zamerajte sa na hodnoty a vzorce, nie na konkrétnych ľudí",
  d5_r_eyebrow:"Úvodný rituál · 7–8 min",
  d5_r_name:"Ukáž mi jednu vec",
  d5_r_desc:"Rodina je abstraktný pojem, kým nie je konkrétny. Prineste si sem svoje korene hmatateľne predtým, než o nich začnete diskutovať.",
  d5_rs1:"Pred rande si každý z vás nájde jednu fotku alebo malý predmet spojený s vašou rodinou či detstvom.",
  d5_rs2:"Ukážte ho partnerovi. V dvoch-troch minútach mu povedzte príbeh, ktorý sa za ním skrýva.",
  d5_rs3:"Počúvajúci položí iba jednu doplňujúcu otázku: „Čo máš na tejto spomienke najradšej?“",
  d5_rs4:"Položte predmety na viditeľné miesto na celý zvyšok rande.",
  d5_rs5:"Začnite rande s vedomím, že každý z vás priniesol kúsok svojej rodiny sem k vám.",
  d5_r_why:"Predmety obchádzajú defenzívu. Vďaka nim je rodina prítomná a skutočná — nie je to len koncept na debatu, ale život, ktorý treba pochopiť.",
  d6_title:"Zábava a dobrodružstvo",
  d6_sub:"Zábava, spontánnosť a spoločná radosť",
  d6_focus:"Páry, ktoré sa spolu zabávajú, spolu aj zostávajú. Preskúmajte, čo vo vás oboch zapaľuje iskru a ako dobre poznáte predstavu toho druhého o zábave.",
  d6_s1:"Podeľte sa o najšťastnejšiu spomienku z detstva spojenú s hrou alebo dobrodružstvom",
  d6_s2:"Opíšte svoje spoločné vysnívané dobrodružstvo — či už veľké alebo malé",
  d6_s3:"Zistite, ktoré aktivity vám dodávajú energiu a ktoré robíte len z povinnosti",
  d6_s4:"Nájdite aspoň jednu novú vec, ktorú by ste si obaja chceli vyskúšať",
  d6_s5:"Porozprávajte sa o tom, ako vyzerala „zábava“ na začiatku vášho vzťahu",
  d6_q1:"Akú hravú vec, ktorú sme zvykli robiť, sme prestali robiť — a chýba ti?",
  d6_q2:"Ako by vyzeral tvoj ideálny spontánny deň so mnou?",
  d6_q3:"Je niečo, čo by si tajne chcel/a vyskúšať, ale ešte si to nespomenul/a?",
  d6_q4:"Smejeme sa spolu dostatočne? Čo ťa so mnou dokáže rozosmiať?",
  d6_q5:"Čo pre teba znamená dobrodružstvo — cestovanie, niečo nové, riziko alebo niečo iné?",
  d6_b1:"Zastavte sa, ak sa z rozhovoru stane zoznam toho, čo vo vašom vzťahu chýba alebo čo je nudné",
  d6_b2:"Neznevažujte partnerovu predstavu o zábave ako detinskú — každá forma hry je dôležitá",
  d6_b3:"Ustúpte, ak sa začnete porovnávať s inými pármi — to nikam nevedie",
  d6_r_eyebrow:"Úvodný rituál · 3 min",
  d6_r_name:"60 sekúnd bláznovstiev",
  d6_r_desc:"O zábave a hre sa nedá hovoriť úplne vážne. Tento rituál prinesie uvoľnenie a ľahkosť predtým, než začnete rande.",
  d6_rs1:"Nastavte si časovač na 60 sekúnd.",
  d6_rs2:"Obaja musíte toho druhého rozosmiať skôr, než vyprší čas — len pomocou tváre, hlasu alebo tela. Žiadne šteklenie. Žiadne pomôcky.",
  d6_rs3:"Ak to prvý nedokáže, skúsi to druhý.",
  d6_rs4:"Sadnite si, stále s úsmevom na tvári.",
  d6_rs5:"Začnite vetou: „Najvtipnejšia vec, akú sme kedy spolu urobili, bola…“",
  d6_r_why:"Smiech je fyziologicky nezlučiteľný s úzkosťou. Keď začnete s radosťou, oveľa ľahšie sa vám bude úprimne hovoriť o zábave.",
  d7_title:"Rast a spiritualita",
  d7_sub:"Zmysel, poslanie a osobný vývoj",
  d7_focus:"Tie najhlbšie otázky — v čo veríte, čo dáva vášmu životu zmysel a ako spolu rastiete? Neexistujú žiadne správne odpovede, len tie úprimné.",
  d7_s1:"Zdieľajte, čo dáva vášmu životu zmysel a poslanie",
  d7_s2:"Diskutujte o svojom presvedčení — duchovnom, filozofickom alebo svetskom",
  d7_s3:"Pýtajte sa: „Ako si sa za posledných päť rokov zmenil/a? Čo ťa zmenilo?“",
  d7_s4:"Preskúmajte, ako vyzerá osobný rast a ako sa v ňom navzájom podporujete",
  d7_s5:"Porozprávajte sa o rituáloch či zvykoch, ktoré sú pre vás ako pár zmysluplné",
  d7_q1:"Čo veríš, že sa stane po smrti — a prináša ti to útechu?",
  d7_q2:"Čo dáva tvojmu životu práve teraz ten najväčší zmysel?",
  d7_q3:"Máš pocit, že podporujem toho, kým sa stávaš, alebo toho, kým si bol/a v minulosti?",
  d7_q4:"Je nejaká časť teba, o ktorej máš pocit, že si ju v našom vzťahu stratil/a? Alebo naopak získal/a?",
  d7_q5:"Čo by si ľutoval/a, že si neurobil/a, keby si vedel/a, že tvoj čas je obmedzený?",
  d7_b1:"Zastavte sa, ak sa rozhovor zvrhne na debatu o tom, čie presvedčenia sú správne — ide tu o porozumenie",
  d7_b2:"Dajte si pauzu, ak sú existenčné obavy príliš skľučujúce — to si vyžaduje hlbšiu prácu, nie tému na večeru",
  d7_b3:"Ustúpte, ak sa jeden z partnerov cíti pod tlakom, aby prijal svetonázor toho druhého",
  d7_r_eyebrow:"Úvodný rituál · 8–10 min",
  d7_r_name:"Spoločné ticho",
  d7_r_desc:"Toto rande prináša tie najväčšie otázky. Zaslúži si naozaj vedomý začiatok. Spoločné ticho nie je trápne — je to začiatok samotného rozhovoru.",
  d7_rs1:"Sadnite si niekam, kde je ticho. Vypnite všetky zvuky.",
  d7_rs2:"Nastavte si časovač na päť minút. Seďte v úplnom tichu vedľa seba alebo tvárou k sebe.",
  d7_rs3:"Žiadne telefóny. Žiadne vrtenie. Len seďte.",
  d7_rs4:"Keď čas vyprší, každý povie prvé slovo, ktoré mu počas ticha napadlo.",
  d7_rs5:"Tieto dve slová použite ako úvodnú otázku: „Prečo ťa napadlo práve toto slovo?“",
  d7_r_why:"Ticho vytvára priestor pre vnútro. Zmysel a poslanie žijú pod nánosmi hluku — päť minút spoločného ticha vás často spojí viac než päť minút rozprávania.",
  d8_title:"Sny a vízie",
  d8_sub:"Budúcnosť, ktorú spoločne budujete",
  d8_focus:"Zlatý klinec randenia. Vytvorte si spoločnú mapu budúcnosti — nie striktný plán, ale živú víziu, ktorá rešpektuje sny oboch z vás.",
  d8_s1:"Každý nech zdieľa svoj najhlbší osobný sen — niečo, čo ste doteraz nikdy naplno nevyslovili",
  d8_s2:"Opíšte váš ideálny spoločný život o desať rokov",
  d8_s3:"Hľadajte prieniky a rozdiely — kde sa vaše sny zhodujú a kde sa naopak rozchádzajú?",
  d8_s4:"Porozprávajte sa o tom, aký odkaz chcete zanechať ako pár a aký ako jednotlivci",
  d8_s5:"Vytvorte si spoločné vyhlásenie o vízii: „Budujeme život, ktorý...“",
  d8_q1:"Aký sen máš už od detstva, ale nikdy si mi o ňom nepovedal/a?",
  d8_q2:"Keby peniaze a strach neexistovali, čo by si robil/a so svojím životom?",
  d8_q3:"Ako pre teba vyzerá úspech — a odráža to náš súčasný život?",
  d8_q4:"Čo chceš, aby ľudia hovorili o nás ako o páre, keď tu už nebudeme?",
  d8_q5:"Máš nejaký sen, o ktorý sa bojíš podeliť, lebo si myslíš, že ťa v ňom nepodporím?",
  d8_b1:"Zastavte sa, ak sny narážajú na vety typu „to nie je reálne“ — to okamžite ničí zraniteľnosť",
  d8_b2:"Neberte rozchádzajúce sa sny ako nekompatibilitu — rôzne vízie môžu existovať vedľa seba",
  d8_b3:"Ustúpte, ak strach z budúcnosti prevalcuje nové možnosti — vráťte sa k tomu, čo je už teraz dobré",
  d8_r_eyebrow:"Úvodný rituál · 10 min",
  d8_r_name:"List do budúcnosti",
  d8_r_desc:"Toto je posledné z pôvodných ôsmich rande. Tento rituál vás otvorí smerom k budúcnosti — od toho, kým ste boli, k tomu, kým sa stávate.",
  d8_rs1:"Každý si vezme kúsok papiera a napíše list samému sebe o desať rokov. Päť až osem viet. Čo dúfate, že bude pravda?",
  d8_rs2:"Vyhraďte si päť minút. Píšte potichu.",
  d8_rs3:"Prečítajte si svoje listy navzájom nahlas. Bez prerušovania.",
  d8_rs4:"Každý z vás odpovie vetou: „Časť, ktorá ma najviac dojala, bola…“",
  d8_rs5:"Zložte listy a uschovajte si ich. Začnite rande s vedomím, že ste do tohto priestoru priniesli svoju budúcnosť.",
  d8_r_why:"Písanie aktivuje premýšľanie o svojom budúcom ja, čo prináša nádej a zámer — presne to nastavenie mysle, ktoré potrebujete na budovanie spoločnej vízie namiesto riešenia aktuálnych problémov.",
  d9_title:"Duševné zdravie a pohoda",
  d9_sub:"Rozhovor, ktorý väčšina párov vedie až po kríze",
  d9_focus:"Preskúmajte svoje emocionálne svety — podmienky, vzorce a potreby, ktoré formujú to, ako každý z vás funguje. Toto nie je terapia; je to predpoklad na to, aby ste si boli navzájom spojencami a nie záhadou.",
  d9_s1:"Podeľte sa o svoju osobnú históriu s úzkosťou, depresiou alebo inými emocionálnymi ťažkosťami",
  d9_s2:"Opíšte svoje prvé varovné signály — ako to vyzerá, keď nie ste „v poriadku“?",
  d9_s3:"Povedzte partnerovi, čo potrebujete, keď sa trápite — a čo situáciu naopak zhoršuje",
  d9_s4:"Diskutujte o svojom postoji k terapii — individuálnej aj párovej",
  d9_s5:"Spravte si spoločný nenápadný plán: čo mám urobiť, keď si všimnem, že nie si v poriadku?",
  d9_q1:"Aké sú tvoje prvé varovné signály, že sa emocionálne trápiš?",
  d9_q2:"Čo odo mňa potrebuješ, keď ti nie je dobre — priestor, prítomnosť alebo niečo iné?",
  d9_q3:"Existuje z minulosti nejaký boj s duševným zdravím, ktorý stále ovplyvňuje tvoje dnešné správanie?",
  d9_q4:"Sťažil/a som ti niekedy situáciu počas ťažkého obdobia bez toho, aby som si to uvedomil/a?",
  d9_q5:"Čo je tá najužitočnejšia vec, ktorú som pre tvoju emocionálnu pohodu urobil/a, hoci som o tom ani nevedel/a?",
  d9_b1:"Zastavte sa, ak začnete partnerovi diagnostikovať alebo vysvetľovať jeho vlastný duševný stav",
  d9_b2:"Dajte si pauzu, ak na povrch vypláva aktuálna kríza — tá potrebuje skutočnú podporu, nie formát rande",
  d9_b3:"Ustúpte, ak sa duševné zdravie používa skôr ako výhovorka na zraňujúce správanie, namiesto snaženia o jeho pochopenie",
  d9_r_eyebrow:"Úvodný rituál · 5 min",
  d9_r_name:"Predpoveď počasia",
  d9_r_desc:"Skôr než začnete hovoriť o svojom vnútri, zmapujte ho jednoduchou metaforou. Odpadne tak tlak na hľadanie správnych slov pre zložité emocionálne stavy.",
  d9_rs1:"Každý si vezme 2 minúty v tichu a doplní vetu: „Moje emocionálne počasie tento týždeň bolo...“",
  d9_rs2:"Zdieľajte svoju predpoveď počasia — slnečno, hmla, búrka, premenlivo, pokojno. Zatiaľ nie je potrebné žiadne vysvetľovanie.",
  d9_rs3:"Počúvajúci povie: „Povedz mi viac o [slovo, ktoré partner použil].“",
  d9_rs4:"Zdieľajte svoje pocity každý len 2 minúty. Nič neriešte. Nesnažte sa to napraviť.",
  d9_rs5:"Zakončite to vetou: „Som rád/a, že to o tebe viem.“",
  d9_r_why:"Metafora vytvára odstup od hanby. Počasie nie je nikoho chyba — jednoducho je. Vďaka tomu je bezpečnejšie hovoriť o duševných stavoch predtým, než začnete ten ťažší rozhovor.",
  d10_title:"Identita a osobná sloboda",
  d10_sub:"Kto ste mimo tohto vzťahu?",
  d10_focus:"Zdravé vzťahy si vyžadujú, aby každý z partnerov zostal samostatnou osobnosťou. Toto rande je o tých častiach vás samých, ktoré existujú — alebo niekedy existovali — nezávisle od toho, že ste niekoho partnerom. Ak chcete vedieť, kým je váš partner, musíte vedieť, kým je, keď je sám.",
  d10_s1:"Porozprávajte sa o tom, kým ste boli pred týmto vzťahom — čo vás definovalo?",
  d10_s2:"Pomenujte záujmy, ambície alebo zvyky, ktoré ste nenápadne odsunuli bokom, odkedy ste spolu",
  d10_s3:"Diskutujte o tom, koľko času osamote skutočne potrebujete a čo vám tento čas vracia",
  d10_s4:"Preskúmajte tie časti seba, o ktorých máte pocit, že ich v tomto vzťahu nemôžete naplno vyjadriť",
  d10_s5:"Opýtajte sa navzájom: kým sa stávaš — a rastieme kompatibilnými smermi?",
  d10_q1:"Existuje verzia teba samého/samej, o ktorej máš pocit, že si ju stratil/a alebo potlačil/a, odkedy sme spolu?",
  d10_q2:"Čo robíš — alebo kým sa stávaš — keď máš čas úplne pre seba?",
  d10_q3:"Čo odo mňa potrebuješ, aby si sa cítil/a slobodný/á byť naplno sám/sama sebou?",
  d10_q4:"Vzdal/a si sa potichu nejakej ambície alebo záujmu kvôli tomuto vzťahu?",
  d10_q5:"Rastieme smermi, ktoré sa ti zdajú byť kompatibilné?",
  d10_b1:"Zastavte sa, ak sa z rozhovoru stane výpočet toho, čo vás vzťah stál — to je už iný a ťažší rozhovor",
  d10_b2:"Dajte si pauzu, ak pocit straty identity vnímate veľmi hlboko — môže to vyžadovať individuálnu terapiu, nie len rande",
  d10_b3:"Ustúpte, ak sa objaví porovnávanie s predchádzajúcim vzťahom alebo bývalým partnerom",
  d10_r_eyebrow:"Úvodný rituál · 5 min",
  d10_r_name:"Tri slová",
  d10_r_desc:"Pred rande si každý v tichosti vyberie tri slová, ktoré vystihujú, kým je mimo tohto vzťahu. Nie rolu — len svoje skutočné ja.",
  d10_rs1:"Vyhraďte si 3 minúty ticha. Každý si napíše tri slová o tom, kým je nezávisle od tohto vzťahu.",
  d10_rs2:"Povedzte si svoje tri slová pekne po jednom. Zatiaľ bez vysvetlenia.",
  d10_rs3:"Počúvajúci si vyberie to najprekvapivejšie slovo: „Povedz mi viac o [danom slove].“",
  d10_rs4:"Každý rozpráva 2 minúty o svojom vybranom slove.",
  d10_rs5:"Zakončite rituál slovami: „Chcem, aby si vždy bol/a touto osobou.“",
  d10_r_why:"Úvod s tromi slovami zbaví stresu z toho, ako začať opisovať samého seba. Zvyčajne na povrch vynesie veci, ktoré nikto z vás nečakal — a prináša pocit, že ste skutočne videní.",
  d11_title:"Starnutie, zdravie a telo",
  d11_sub:"Fyzická zraniteľnosť a spoločné starnutie",
  d11_focus:"Rozhovor o telách, zdraví a starnutí väčšina párov odkladá, kým ich k nemu nedonútia okolnosti. Ak ho absolvujete včas — zo zvedavosti, nie zo strachu — zmení to spôsob, akým budete obaja zvládať choroby, zmeny a plynúci čas vo vašom vzťahu.",
  d11_s1:"Podeľte sa o rodinnú anamnézu a porozprávajte sa, čo to môže znamenať pre vašu budúcnosť",
  d11_s2:"Rozprávajte sa úprimne o svojom vzťahu k vlastnému telu — nielen o vzhľade, ale aj o vitalite",
  d11_s3:"Diskutujte o opatrovaní: čo by si odo mňa potreboval/a, keby si vážne ochorel/a?",
  d11_s4:"Preskúmajte svoje priania ohľadom konca života — tento rozhovor chráni vás oboch",
  d11_s5:"Porozprávajte sa o starnúcich rodičoch: akú zodpovednosť každý z vás cíti a ako to ovplyvňuje vás ako pár",
  d11_q1:"Existuje nejaká obava o zdravie, ktorú v tichosti nesieš a o ktorej naplno neviem?",
  d11_q2:"Čo by si odo mňa potreboval/a, keby si vážne ochorel/a?",
  d11_q3:"Aký máš momentálne vzťah k svojmu telu — si s ním zmierený/á?",
  d11_q4:"Ako sa staviaš k starnutiu — desí ťa to, alebo sa s tým cítiš v pohode?",
  d11_q5:"Premýšľal/a si niekedy nad tým, čo by si chcel/a na konci svojho života?",
  d11_b1:"Zastavte sa, ak diskusia o konci života spustí akútnu úzkosť — rozdeľte si to na menšie časti niekedy inokedy",
  d11_b2:"Dajte si pauzu, ak sa vaša zraniteľnosť ohľadom vnímania tela stretne s odmietnutím namiesto pochopenia",
  d11_b3:"Ustúpte, ak sa opatera zmení na obchodnú záležitosť — „zostal/a by si so mnou, keby som ochorel/a?“ je test, nie rozhovor",
  d11_r_eyebrow:"Úvodný rituál · 8 min",
  d11_r_name:"List vlastnému telu",
  d11_r_desc:"Skôr než začnete hovoriť o zdraví a starnutí, doprajte si čas na to, aby ste potichu prijali telo, v ktorom žijete — s vďačnosťou, bez odsudzovania.",
  d11_rs1:"Každý si nechá 3 minúty na to, aby si potichu dokončil vetu: „Drahé moje telo, ďakujem ti za...“",
  d11_rs2:"Nemusíte si to písať — stačí na to len myslieť. Ale pokojne si to napíšte, ak vám to pomôže.",
  d11_rs3:"Podeľte sa o to, čo vám napadlo. Nie celý list — len jedna vec, za ktorú ste pocítili vďačnosť.",
  d11_rs4:"Počúvajúci odpovie len: „Som rád/a, že si mi to povedal/a.“",
  d11_rs5:"Z tohto miesta prijatia začnite vaše rande.",
  d11_r_why:"Väčšina rozhovorov o zdraví pramení zo strachu alebo nedostatku. Začať vďačnosťou vás oboch preorientuje od úzkosti k starostlivosti — a to je zásadne iný emocionálny východiskový bod.",
  d12_title:"Politické a spoločenské hodnoty",
  d12_sub:"Tomu, čomu veríte ohľadom sveta",
  d12_focus:"Politické a spoločenské hodnoty sú hlboko osobné — formované detstvom, skúsenosťami a tým, čoho ste boli svedkami. Mnoho párov predpokladá zhodu bez toho, aby si to niekedy overili. Toto rande je o pochopení svetonázoru toho druhého, nie o tom, aby ste s ním za každú cenu súhlasili.",
  d12_s1:"Podeľte sa o to, ako sa formovali vaše politické a spoločenské hodnoty — aké skúsenosti ich ovplyvnili?",
  d12_s2:"Pomenujte spoločenskú otázku, na ktorej vám najviac záleží — a prečo ju vnímate tak osobne",
  d12_s3:"Preskúmajte, kde sa vaše hodnoty naozaj rozchádzajú — a či to vnímate ako zvládnuteľné",
  d12_s4:"Porozprávajte sa o tom, čo by ste chceli naučiť svoje deti o spravodlivosti, komunite a moci",
  d12_s5:"Nájdite aspoň jednu hodnotu, ktorú obaja stopercentne zdieľate, a pomenujte ju nahlas",
  d12_q1:"Aká politická alebo spoločenská téma je tvojmu srdcu najbližšia — a čo ju urobilo pre teba osobnou?",
  d12_q2:"Je nejaká moja hodnota, ktorú zásadne nezdieľaš?",
  d12_q3:"Ako sa cítiš, keď sa v niečom politickom nezhodneme — ohrozene, zvedavo, alebo je ti to jedno?",
  d12_q4:"Existuje nejaká komunita alebo iniciatíva, o ktorú by si si prial/a, aby som sa zaujímal/a viac?",
  d12_q5:"Existuje nejaké moje presvedčenie, z ktorého máš potichu obavy?",
  d12_b1:"Zastavte sa, ak sa rozhovor zmení na debatu, v ktorej ide o to nájsť správnu a nesprávnu odpoveď",
  d12_b2:"Ustúpte, ak sa niekto z vás začne cenzurovať, aby sa vyhol konfliktu — mlčanie neznamená súhlas",
  d12_b3:"Dajte si pauzu, ak sa v rozhovore začnú spájať politické názory s osobným charakterom alebo inteligenciou",
  d12_r_eyebrow:"Úvodný rituál · 5 min",
  d12_r_name:"Titulok",
  d12_r_desc:"Predtým, než začnete hovoriť o svojich hodnotách, nech každý zdieľa jednu správu z minulého týždňa, ktorá v ňom niečo vyvolala. Nie na debatu — len na zdieľanie daného pocitu.",
  d12_rs1:"Každý nech si spomenie na jednu správu alebo udalosť z minulého týždňa, ktorá vo vás vyvolala silný pocit.",
  d12_rs2:"Povedzte to v jednej vete — iba titulok.",
  d12_rs3:"Potom dodajte: „Vyvolalo to vo mne [emóciu], pretože...“",
  d12_rs4:"Počúvajúci zareaguje len na ten pocit: „Chápem, prečo si sa tak cítil/a.“",
  d12_rs5:"Vymeňte si roly. A potom začnite rande.",
  d12_r_why:"Vstup do rozhovoru o hodnotách cez emócie, a nie cez politické postoje, búra defenzívnu štruktúru debaty. Neobhajujete politiku — zdieľate, aké to je byť vami v tomto svete.",
  footer_credit:"Sprievodca dvanástimi kľúčovými rozhovormi pre trvalý vzťah",
  footer_sub:"Sprievodca rozhovormi, ktoré udržujú lásku nažive",
  formDates:[
    {num:"01",title:"Dôvera a záväzok",sub:"Základ všetkého ostatného",qs:["Kedy sa v našom vzťahu cítiš najbezpečnejšie — a kedy naopak najneistejšie?","Urobil/a som niečo, čo poškodilo tvoju dôveru, hoci aj nepatrne?","Čo pre teba znamená lojalita nad rámec samotnej vernosti?","Čo by si odo mňa potreboval/a, aby si sa cítil/a úplne bezpečne?","Keby sa náš vzťah niekedy skončil, čo by si povedal/a, že sa rozpadlo ako prvé?"]},
    {num:"02",title:"Konflikt",sub:"Ako sa hádať múdrejšie, nie tvrdšie",qs:["Čo robím pri našich hádkach, čo ti najviac ubližuje?","O čo ma v skutočnosti žiadaš, keď sa hádame o tejto téme?","Ako sa riešili konflikty v tvojej rodine, keď si vyrastal/a?","Čo by ti pomohlo, aby si sa počas nezhody cítil/a vypočutý/á?","Máme za sebou nejakú hádku, ktorá ťa stále trápi, lebo zostala nevyriešená?"]},
    {num:"03",title:"Sex a intimita",sub:"Túžba, blízkosť a zraniteľnosť",qs:["Kedy máš pocit, že sme si najbližší — pri fyzickej intimite, alebo v iných momentoch?","Je niečo o našom sexuálnom živote, čo si mi chcel/a povedať, ale doteraz si to neurobil/a?","Ako vnímaš to, ako často sme teraz intímni?","Keď prevezmem iniciatívu ja, cítiš sa žiadaný/á, alebo pod tlakom?","Čo by ti pomohlo cítiť sa emocionálne prepojenejšie ešte pred fyzickým zblížením?"]},
    {num:"04",title:"Práca a peniaze",sub:"Hodnoty, bezpečie a spoločná budúcnosť",qs:["Boli peniaze počas tvojho dospievania zdrojom stresu, bezpečia, alebo niečoho iného?","Cítiš sa momentálne v našom vzťahu finančne bezpečne?","Ako pre teba vyzerá finančná sloboda?","Urobil/a som nejaké finančné rozhodnutie, ktoré ťa znepokojilo alebo frustrovalo?","Cítiš podporu vo svojich kariérnych cieľoch — alebo ťa niečo brzdí?"]},
    {num:"05",title:"Rodina",sub:"Korene, roly a rodiny, z ktorých pochádzame",qs:["Čo z tvojej výchovy by si chcel/a, aby sme preniesli do nášho vzťahu/rodiny?","Akého vzorca z tvojej rodiny sa bojíš, že ho zopakuješ?","Ako sa u vás doma prejavovala láska — slovami, činmi, časom?","Ako u vás doma vyzerali konflikty — riešili sa, alebo zametali pod koberec?","Akú rodinnú kultúru by si chcel/a, aby sme si spoločne vytvorili?"]},
    {num:"06",title:"Zábava a dobrodružstvo",sub:"Zábava, spontánnosť a spoločná radosť",qs:["Akú hravú vec, ktorú sme zvykli robiť, sme prestali robiť — a chýba ti?","Ako by vyzeral tvoj ideálny spontánny deň so mnou?","Je niečo, čo by si tajne chcel/a vyskúšať, ale ešte si to nespomenul/a?","Smejeme sa spolu dostatočne? Čo ťa so mnou dokáže rozosmiať?","Čo pre teba znamená dobrodružstvo — cestovanie, niečo nové, riziko alebo niečo iné?"]},
    {num:"07",title:"Rast a spiritualita",sub:"Zmysel, poslanie a osobný vývoj",qs:["Čo veríš, že sa stane po smrti — a prináša ti to útechu?","Čo dáva tvojmu životu práve teraz ten najväčší zmysel?","Máš pocit, že podporujem toho, kým sa stávaš, alebo toho, kým si bol/a v minulosti?","Je nejaká časť teba, o ktorej máš pocit, že si ju v našom vzťahu stratil/a? Alebo naopak získal/a?","Čo by si ľutoval/a, že si neurobil/a, keby si vedel/a, že tvoj čas je obmedzený?"]},
    {num:"08",title:"Sny a vízie",sub:"Budúcnosť, ktorú spoločne budujete",qs:["Aký sen máš už od detstva, ale nikdy si mi o ňom nepovedal/a?","Keby peniaze a strach neexistovali, čo by si robil/a so svojím životom?","Ako pre teba vyzerá úspech — a odráža to náš súčasný život?","Čo chceš, aby ľudia hovorili o nás ako o páre, keď tu už nebudeme?","Máš nejaký sen, o ktorý sa bojíš podeliť, lebo si myslíš, že ťa v ňom nepodporím?"]},

    {num:"10",title:"Identita a osobná sloboda",sub:"Kto ste mimo tohto vzťahu?",qs:["Existuje verzia teba samého/samej, o ktorej máš pocit, že si ju stratil/a, odkedy sme spolu?","Kým sa stávaš, keď máš čas úplne pre seba?","Čo odo mňa potrebuješ, aby si sa cítil/a slobodný/á byť naplno sám/sama sebou?","Vzdal/a si sa potichu nejakej ambície alebo záujmu kvôli tomuto vzťahu?","Rastieme smermi, ktoré sa ti zdajú byť kompatibilné?"]},

  d10_title:"Identita a osobní svoboda",

  d11_title:"Stárnutí, zdraví a tělo",
